<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iCAN · English Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --ink:#15183A; --ink-2:#232a5c; --paper:#FBFAF6; --card:#FFFFFF;
  --coral:#FF5A5F; --coral-dk:#E6464B; --amber:#FFD23F; --teal:#0FA98B; --teal-dk:#0c8a72;
  --mist:#E7E6F0; --line:#D9D8E6; --slate:#3A3F58; --muted:#6E7290;
  --hl:#FFE066; --radius:16px; --shadow:0 10px 30px -12px rgba(21,24,58,.25);
  --fs:1; /* accessibility font scale */ --ls:1.6; /* line spacing */
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:var(--paper); color:var(--slate);
  font-family:"Lexend",system-ui,sans-serif; line-height:var(--ls);
  font-size:calc(16px * var(--fs)); -webkit-font-smoothing:antialiased;
}
body.dyslexia{ letter-spacing:.04em; word-spacing:.16em; --ls:1.9; font-weight:400; }
body.contrast{ --paper:#fff; --slate:#000; --muted:#222; --line:#000; --card:#fff;}
h1,h2,h3,.display{font-family:"Fraunces",Georgia,serif; color:var(--ink); line-height:1.1; margin:0;}
a{color:var(--coral)}
button{font-family:inherit; cursor:pointer; font-size:1rem}
.hidden{display:none !important}

/* ---------- layout ---------- */
.wrap{max-width:1080px; margin:0 auto; padding:0 20px}
.screen{min-height:100vh; padding:90px 0 80px}
.center{display:flex; align-items:center; justify-content:center; min-height:100vh; padding:80px 20px}

/* ---------- top bar ---------- */
.topbar{position:fixed; top:0; left:0; right:0; height:62px; background:rgba(251,250,246,.9);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--line); z-index:50;
  display:flex; align-items:center; justify-content:space-between; padding:0 20px}
.brand{display:flex; align-items:center; gap:10px; font-family:"Fraunces"; font-weight:700; font-size:1.35rem; color:var(--ink)}
.brand .dot{display:inline-block; background:var(--amber); border-radius:4px; padding:0 .25em; box-shadow:inset 0 -6px 0 rgba(0,0,0,.06)}
.brand small{font-family:"Lexend"; font-weight:400; color:var(--muted); font-size:.7rem; letter-spacing:.18em; text-transform:uppercase}
.who{display:flex; align-items:center; gap:12px; font-size:.85rem; color:var(--muted)}
.who b{color:var(--ink)}

/* ---------- accessibility toolbar ---------- */
.a11y{position:fixed; right:14px; bottom:14px; z-index:60; display:flex; flex-direction:column; gap:8px; align-items:flex-end}
.a11y-toggle{background:var(--ink); color:#fff; border:none; border-radius:50px; padding:11px 16px; box-shadow:var(--shadow); display:flex; gap:8px; align-items:center; font-weight:500}
.a11y-panel{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px; box-shadow:var(--shadow); display:grid; gap:8px; width:230px}
.a11y-panel h4{font-family:"Lexend"; font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:2px 0 0}
.a11y-row{display:flex; gap:6px; flex-wrap:wrap}
.chip{border:1px solid var(--line); background:#fff; border-radius:9px; padding:7px 10px; font-size:.8rem; color:var(--slate); flex:1; min-width:42px; text-align:center}
.chip.on{background:var(--ink); color:#fff; border-color:var(--ink)}

/* ---------- buttons ---------- */
.btn{background:var(--coral); color:#fff; border:none; border-radius:12px; padding:13px 22px; font-weight:600; box-shadow:0 6px 16px -6px rgba(255,90,95,.6); transition:transform .12s ease, filter .12s}
.btn:hover{filter:brightness(1.05)} .btn:active{transform:translateY(1px)}
.btn.ghost{background:#fff; color:var(--ink); border:1.5px solid var(--line); box-shadow:none}
.btn.dark{background:var(--ink); box-shadow:none}
.btn.teal{background:var(--teal); box-shadow:0 6px 16px -6px rgba(15,169,139,.6)}
.btn.sm{padding:8px 14px; font-size:.85rem; border-radius:10px}
.btn:disabled{opacity:.5; cursor:not-allowed}

/* ---------- cards ---------- */
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow)}
.grid{display:grid; gap:18px}
@media(min-width:720px){ .grid.c2{grid-template-columns:1fr 1fr} .grid.c4{grid-template-columns:repeat(2,1fr)} }
@media(min-width:980px){ .grid.c4{grid-template-columns:repeat(4,1fr)} }

/* ---------- home ---------- */
.hero{text-align:center; max-width:640px}
.hero .kicker{font-family:"Lexend"; letter-spacing:.22em; text-transform:uppercase; font-size:.72rem; color:var(--muted); margin-bottom:14px}
.hero h1{font-size:clamp(2.6rem,7vw,4.4rem); font-weight:600}
.mark{background:linear-gradient(transparent 60%, var(--hl) 60%); padding:0 .08em}
.hero p{color:var(--muted); font-size:1.05rem; margin:18px auto 30px; max-width:480px}
.role-grid{display:grid; gap:16px; grid-template-columns:1fr; max-width:520px; margin:0 auto}
@media(min-width:560px){ .role-grid{grid-template-columns:1fr 1fr} }
.role{cursor:pointer; text-align:left; border:1.5px solid var(--line); background:#fff; border-radius:var(--radius); padding:22px; transition:.15s; display:block}
.role:hover{border-color:var(--ink); transform:translateY(-3px)}
.role .ic{font-size:1.8rem} .role h3{margin:10px 0 4px; font-size:1.3rem} .role p{margin:0; color:var(--muted); font-size:.9rem}

/* ---------- forms ---------- */
.field{display:block; margin-bottom:14px; text-align:left}
.field label{display:block; font-size:.8rem; color:var(--muted); margin-bottom:6px; font-weight:500}
.field input, .field select, textarea{width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:11px; font-family:inherit; font-size:1rem; color:var(--ink); background:#fff}
.field input:focus, textarea:focus, select:focus{outline:none; border-color:var(--coral)}
textarea{min-height:150px; resize:vertical; line-height:1.6}
.err{color:var(--coral-dk); font-size:.85rem; margin-top:8px; min-height:1.2em}

/* ---------- pathway ---------- */
.path{cursor:pointer; text-align:left; border:none; border-radius:var(--radius); padding:24px; color:#fff; min-height:150px; display:flex; flex-direction:column; justify-content:space-between; transition:.15s; position:relative; overflow:hidden}
.path:hover{transform:translateY(-4px)}
.path .ic{font-size:2rem} .path h3{color:#fff; font-size:1.4rem; margin-top:10px} .path span{font-size:.82rem; opacity:.85}
.path.read{background:linear-gradient(135deg,#2b2f63,#15183A)}
.path.write{background:linear-gradient(135deg,#E6464B,#FF7A5F)}
.path.listen{background:linear-gradient(135deg,#0FA98B,#1ec6a4)}
.path.speak{background:linear-gradient(135deg,#8B5CF6,#6D3FD6)}

/* ---------- reading ---------- */
.level-slider{position:relative; display:inline-flex; background:#fff; border:1.5px solid var(--line); border-radius:50px; padding:5px; user-select:none}
.level-slider button{position:relative; z-index:2; border:none; background:none; border-radius:50px; padding:9px 18px; font-size:.85rem; font-weight:600; color:var(--muted); transition:color .25s; white-space:nowrap}
.level-slider .knob{position:absolute; top:5px; bottom:5px; left:5px; width:90px; border-radius:50px; background:var(--ink); transition:left .3s cubic-bezier(.34,1.4,.5,1), width .3s, background .25s; z-index:1}
.level-slider[data-level="scaffolded"] .knob{background:var(--teal)}
.level-slider[data-level="standard"] button:first-of-type{color:#fff}
.level-slider[data-level="scaffolded"] button:last-of-type{color:#fff}
.passage{font-family:"Lexend"; max-width:680px}
.passage p{margin:0 0 1em} .passage h3{font-size:1.7rem; margin:0 0 6px}
.genre-tag{display:inline-block; font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:var(--coral-dk); font-weight:600; margin-bottom:4px}
.reader-tools{display:flex; gap:8px; flex-wrap:wrap; margin:14px 0 20px; padding:12px; background:#fff; border:1px solid var(--line); border-radius:12px}
mark.user-hl{background:var(--hl); padding:0 1px; border-radius:2px}
.figure{border:1px solid var(--line); border-radius:12px; padding:16px; background:#fff; margin:16px 0}
.figure table{width:100%; border-collapse:collapse; font-family:"Lexend"; font-size:.9rem}
.figure th,.figure td{border:1px solid var(--line); padding:8px 10px; text-align:left}
.figure th{background:var(--mist); color:var(--ink)}
.figure figcaption{font-size:.8rem; color:var(--muted); margin-top:8px}
.bar{height:14px; background:var(--coral); border-radius:4px; margin:4px 0}

/* ---------- quiz ---------- */
.q{border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:12px; background:#fff}
.q .qhead{font-weight:500; color:var(--ink); margin-bottom:10px}
.opt{display:flex; gap:10px; align-items:flex-start; padding:9px 12px; border:1.5px solid var(--line); border-radius:10px; margin-bottom:8px; cursor:pointer}
.opt:hover{border-color:var(--ink)}
.opt input{margin-top:3px}
.opt.correct{border-color:var(--teal); background:rgba(15,169,139,.08)}
.opt.wrong{border-color:var(--coral); background:rgba(255,90,95,.08)}
.feedback{font-size:.85rem; margin-top:6px; padding:8px 10px; border-radius:8px; background:var(--mist)}
.feedback.good{background:rgba(15,169,139,.12); color:var(--teal-dk)}
.scorebox{text-align:center; padding:22px; border-radius:14px; background:var(--ink); color:#fff; margin-top:10px}
.scorebox .big{font-family:"Fraunces"; font-size:3rem; color:#fff}

/* ---------- lists / misc ---------- */
.item-row{display:flex; justify-content:space-between; gap:12px; align-items:center; padding:16px; border:1px solid var(--line); border-radius:12px; background:#fff; margin-bottom:10px}
.item-row .meta{font-size:.82rem; color:var(--muted)}
.pill{display:inline-block; font-size:.7rem; padding:3px 9px; border-radius:50px; background:var(--mist); color:var(--ink); font-weight:500}
.pill.done{background:rgba(15,169,139,.15); color:var(--teal-dk)}
.back{background:none; border:none; color:var(--muted); padding:0; margin-bottom:18px; font-size:.9rem}
.section-title{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px; margin-bottom:22px}
.rubric{list-style:none; padding:0; margin:14px 0}
.rubric li{display:flex; gap:10px; padding:8px 0; border-bottom:1px dashed var(--line); font-size:.92rem}
.rubric input{margin-top:4px}
.note{font-size:.85rem; color:var(--muted); background:var(--mist); padding:12px 14px; border-radius:10px}
.dictate-display{font-size:2rem; font-family:"Fraunces"; text-align:center; padding:20px; letter-spacing:.05em; color:var(--ink)}
.spell-timer{position:relative; height:10px; background:var(--mist); border-radius:50px; margin:24px 0 16px}
.spell-bar{height:100%; background:var(--coral); border-radius:50px; width:100%; transition:width 1s linear}
.spell-timer span{position:absolute; right:0; top:-24px; font-weight:700; color:var(--ink); font-family:"Fraunces"; font-size:1.2rem}
.gap-input{display:inline-block; width:auto; min-width:160px; padding:8px 12px; border:1.5px solid var(--line); border-radius:10px; font-family:inherit; font-size:1rem}
.audio-player{display:flex; gap:10px; align-items:center; flex-wrap:wrap; padding:16px; background:var(--ink); border-radius:14px; margin:14px 0}
.audio-player .btn{box-shadow:none}
.audio-player .label{color:#fff; font-size:.85rem}
.card ul{margin:8px 0 0; padding-left:20px} .card ul li{margin-bottom:6px; font-size:.92rem}
.bands{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:12px 0}
details.script{margin-top:10px; border:1px dashed var(--line); border-radius:10px; padding:10px 14px; background:#fff}
details.script summary{cursor:pointer; color:var(--muted); font-size:.85rem}
h2.sub{font-size:1.4rem; margin:30px 0 4px}
.transcript{min-height:80px; border:1px dashed var(--line); border-radius:10px; padding:14px; background:#fff; font-style:italic; color:var(--slate)}
table.data{width:100%; border-collapse:collapse; font-size:.85rem; margin-top:14px}
table.data th, table.data td{border:1px solid var(--line); padding:9px 11px; text-align:left}
table.data th{background:var(--ink); color:#fff; position:sticky; top:0}
table.data tr:nth-child(even){background:#fff}
.kbd{font-family:monospace; background:var(--ink); color:var(--amber); padding:2px 8px; border-radius:6px; font-size:.85em}
.tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:18px}
.tabs button{border:1.5px solid var(--line); background:#fff; border-radius:50px; padding:8px 16px; font-size:.85rem; color:var(--muted)}
.tabs button.on{background:var(--coral); color:#fff; border-color:var(--coral)}
@media (prefers-reduced-motion: reduce){*{transition:none !important; scroll-behavior:auto}}
</style>
</head>
<body>

<!-- ============ TOP BAR ============ -->
<div class="topbar">
  <div class="brand" onclick="go('home')" style="cursor:pointer">
    <span>i<span class="dot">CAN</span></span>
    <small>English Practice</small>
  </div>
  <div class="who" id="whoBar"></div>
</div>

<!-- ============ ACCESSIBILITY TOOLBAR ============ -->
<div class="a11y">
  <div class="a11y-panel hidden" id="a11yPanel">
    <h4>Text size</h4>
    <div class="a11y-row">
      <button class="chip" onclick="setFont(-0.1)">A−</button>
      <button class="chip" onclick="setFont(0)">Reset</button>
      <button class="chip" onclick="setFont(0.1)">A+</button>
    </div>
    <h4>Reading support</h4>
    <div class="a11y-row">
      <button class="chip" id="cDys" onclick="toggleClassBody('dyslexia','cDys')">Easy-read font</button>
      <button class="chip" id="cCon" onclick="toggleClassBody('contrast','cCon')">High contrast</button>
    </div>
    <div class="a11y-row">
      <button class="chip" id="cHl" onclick="toggleHighlighter()">✏️ Highlighter</button>
      <button class="chip" onclick="clearHighlights()">Clear marks</button>
    </div>
    <h4>Read to me</h4>
    <div class="a11y-row">
      <button class="chip" onclick="readPage()">▶ Play</button>
      <button class="chip" onclick="stopSpeak()">■ Stop</button>
    </div>
  </div>
  <button class="a11y-toggle" onclick="toggleA11y()">♿ Tools</button>
</div>

<!-- ============ SCREENS MOUNT ============ -->
<main id="app"></main>

<script>
/* =========================================================================
   iCAN — configuration you can change
   ========================================================================= */
const CONFIG = {
  teacherCode: "TEACHER-ICAN-2025",      // <-- change this and keep it private
  // Student access codes you hand out. Edit freely, or add them from the
  // Teacher dashboard (those are saved in this browser).
  classCodes: ["ICAN-9A", "ICAN-10B", "ICAN-11C", "ICAN-12D", "DEMO"],
  // Online sync (optional). Paste your Google Sheet web-app URL here, OR set it
  // from the Teacher dashboard. When set, every result is saved online and the
  // teacher dashboard reads everyone's records from the cloud. Leave "" for
  // local-only mode (still fully works + Excel export).
  cloudUrl: ""
};

/* =========================================================================
   Storage — uses the browser when hosted; falls back to memory in preview.
   When you add a backend later, replace these 4 functions with fetch() calls.
   ========================================================================= */
const Store = {
  mem:{},
  _ok(){ try{ const k="__t"; localStorage.setItem(k,"1"); localStorage.removeItem(k); return true; }catch(e){ return false; } },
  get(k){ if(this._ok()){ const v=localStorage.getItem(k); return v?JSON.parse(v):null; } return this.mem[k]??null; },
  set(k,v){ if(this._ok()){ localStorage.setItem(k,JSON.stringify(v)); } else { this.mem[k]=v; } }
};
function getResults(){ return Store.get("ican_results")||[]; }
function getCodes(){ return Store.get("ican_codes")||CONFIG.classCodes.slice(); }
function saveResult(r){ const a=getResults(); a.push(r); Store.set("ican_results",a); cloudSave(r); }
function getStudents(){ return Store.get("ican_students")||{}; }
function setStudent(id,o){ const s=getStudents(); s[id]=Object.assign(s[id]||{},o); Store.set("ican_students",s); }

/* ---- Online sync (Google Sheet web app). Local always works as a backup. ---- */
function cloudUrl(){ return Store.get("ican_cloud_url") || CONFIG.cloudUrl || ""; }
function setCloudUrl(u){ Store.set("ican_cloud_url", u.trim()); }
function cloudSave(rec){
  const url = cloudUrl(); if(!url) return;
  try{ fetch(url, {method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(rec)}); }
  catch(e){ /* offline; local copy is kept */ }
}
let _cbN = 0, CLOUD_CACHE = [];
function cloudList(cb){
  const url = cloudUrl(); if(!url){ cb(null); return; }
  const name = "__icanCb" + (++_cbN);
  const s = document.createElement("script");
  let done = false;
  window[name] = function(data){ done=true; try{ s.remove(); }catch(e){} delete window[name]; cb(data); };
  s.onerror = ()=>{ if(!done){ try{ s.remove(); }catch(e){} cb(null); } };
  s.src = url + (url.includes("?")?"&":"?") + "action=list&callback=" + name + "&t=" + Date.now();
  document.body.appendChild(s);
  setTimeout(()=>{ if(!done){ try{ s.remove(); }catch(e){} cb(null); } }, 8000);
}
function rkey(r){ return r.date+"|"+(r.name||"")+"|"+(r.activity||"")+"|"+(r.skill||""); }
function allResults(){
  const local = getResults(); const seen = new Set(local.map(rkey)); const merged = local.slice();
  CLOUD_CACHE.forEach(r=>{ if(r && !seen.has(rkey(r))){ seen.add(rkey(r)); merged.push(r); } });
  return merged.sort((a,b)=>a.date-b.date);
}
function refreshCloud(then){ cloudList(data=>{ if(Array.isArray(data)) CLOUD_CACHE = data; if(then) then(); }); }

let SESSION = null; // {role, name, class, code, id}

/* =========================================================================
   CONTENT — original practice material. Add more by extending these arrays.
   Each reading item has a STANDARD and a SCAFFOLDED (SEN / below-grade) version.
   ========================================================================= */
const READING = [
  {
    id:"r1", genre:"Technology · Contemporary debate", title:"Can a Machine Be Creative?", type:"Article",
    standard:{
      text:`<p>When an artificial-intelligence program paints a portrait or writes a melody, audiences are often impressed — and uneasy. The image may be striking, yet something about its origin provokes doubt. Is the machine truly <em>creating</em>, or merely recombining the millions of human-made works it has studied?</p>
      <p>Defenders of machine creativity argue that human artists also learn by imitation. A young painter copies the masters before finding a personal style; a songwriter absorbs the music of others. If borrowing and remixing count as creativity in people, they say, the same should hold for software.</p>
      <p>Critics push back. Creativity, they argue, is not only the output but the <strong>intention</strong> behind it — the desire to express a feeling, to say something about being alive. A program has no feelings to express and no life to reflect upon. It produces patterns, not meaning.</p>
      <p>Perhaps the real question is not whether machines can be creative, but what we want creativity to be. As these tools spread through classrooms, studios and newsrooms, that definition may matter more than ever.</p>`,
      questions:[
        {type:"mcq", q:"Why are audiences described as 'uneasy'?", options:["The images are ugly","They doubt whether the machine truly creates","Machines are expensive","The melodies are too loud"], answer:1, exp:"The passage says the origin of the work 'provokes doubt' about whether the machine is really creating."},
        {type:"mcq", q:"How do defenders of machine creativity support their view?", options:["By saying machines have feelings","By noting that humans also learn by imitation","By claiming machines are smarter than people","By saying art does not matter"], answer:1, exp:"They compare AI to a young painter copying the masters."},
        {type:"mcq", q:"According to critics, creativity depends most on…", options:["Speed","Intention and meaning","Colour","Cost"], answer:1, exp:"Critics stress the intention behind the work — expressing feeling and meaning."},
        {type:"short", q:"In your own words, what does the writer suggest the 'real question' is?", answer:"The writer suggests the real question is not whether machines can be creative, but how we choose to define creativity itself.", exp:"Look at the final paragraph — it reframes the debate around our definition of creativity."},
        {type:"short", q:"Find a word in paragraph 3 that means 'purpose' or 'aim'.", answer:"intention", exp:"'Intention' (the desire behind an action) is the key term in paragraph 3."}
      ]
    },
    scaffolded:{
      text:`<p>An AI program can now make pictures and music. People are often impressed. But they also feel unsure. Is the machine really <em>making</em> something new? Or is it just copying the human art it has studied?</p>
      <p>Some people say machines <strong>are</strong> creative. They say humans also learn by copying. A young artist copies famous painters first. So copying can lead to creativity.</p>
      <p>Other people disagree. They say real creativity needs a <strong>reason</strong> — a wish to share a feeling. A machine has no feelings. So it makes patterns, not meaning.</p>
      <p>Maybe the big question is this: what do we <em>want</em> creativity to mean?</p>`,
      questions:[
        {type:"mcq", q:"How do people feel when AI makes art?", options:["Bored","Impressed but unsure","Angry","Sleepy"], answer:1, exp:"The text says people are impressed but also feel unsure."},
        {type:"short", q:"In one sentence, why do some people say a machine is NOT really creative?", answer:"Because a machine has no feelings to share, so it only makes patterns, not meaning.", exp:"Look at paragraph 3 — it talks about feelings and meaning."},
        {type:"reflect", q:"Knowledge building: Write one or two new things you learned from this text. Then say — do YOU think a machine can be creative? Why?", exp:"There is no single right answer. Share what you learned and your own honest opinion, with a reason."}
      ]
    }
  },
  {
    id:"r2", genre:"Society · Contemporary debate", title:"Should Phones Be Banned in Schools?", type:"Blog post",
    standard:{
      text:`<p><em>Posted by Mara, 16 — student blog</em></p>
      <p>My school banned phones last term, and the corridors sound different now. There is talking, laughter, even arguments — the ordinary noise of people actually noticing one another. For years our break times were silent rows of bent necks and glowing screens.</p>
      <p>I won't pretend the ban was popular. Many of us felt cut off, anxious without the comfort of a quick scroll. Some pointed out that phones help us look up facts, contact parents, and stay safe walking home. These are fair points.</p>
      <p>Yet I've noticed I concentrate better. The temptation to check a notification mid-lesson is simply gone. My grades have not soared overnight, but my attention feels less fractured, more whole.</p>
      <p>So I find myself oddly grateful for a rule I once resented. Maybe the best decisions are the ones that protect us from our own habits.</p>`,
      questions:[
        {type:"mcq", q:"What change did Mara notice in the corridors?", options:["They were emptier","There was more talking and laughter","They were darker","Lessons were longer"], answer:1, exp:"She describes hearing talking, laughter and arguments — people noticing each other."},

const app = () => document.getElementById('app');

function go(screen, arg){
  CURRENT_SCREEN = screen; CURRENT_ARG = arg;
  stopSpeak(); turnOffHighlighter(); clearSpellTimer(); window.scrollTo(0,0);
  ROUTES[screen](arg); updateWho();
  requestAnimationFrame(positionKnobs);
}
function positionKnobs(){
  document.querySelectorAll('.level-slider').forEach(sl=>{
    const btns = sl.querySelectorAll('button');
    const active = sl.getAttribute('data-level')==='standard' ? btns[0] : btns[1];
    const knob = sl.querySelector('.knob');
    if(active && knob){ knob.style.left = active.offsetLeft+'px'; knob.style.width = active.offsetWidth+'px'; }
  });
}
window.addEventListener('resize', positionKnobs);
function updateWho(){
  const w=document.getElementById('whoBar');
  if(!SESSION){ w.innerHTML=""; return; }
  if(SESSION.role==="teacher"){ w.innerHTML=`<span>Teacher</span> · <button class="btn ghost sm" onclick="logout()">Log out</button>`; }
  else { w.innerHTML=`<span><b>${esc(SESSION.name)}</b> · ${esc(SESSION.class)}</span> <button class="btn ghost sm" onclick="logout()">Log out</button>`; }
}
function logout(){ SESSION=null; go('home'); }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderQuiz(qs){
  const box=document.getElementById('quiz');
  box.innerHTML = qs.map((q,i)=>{
    if(q.type==="mcq"){
      return `<div class="q" data-i="${i}"><div class="qhead">${i+1}. ${q.q}</div>
        ${q.options.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${o}</span></label>`).join('')}
        <div class="feedback hidden"></div></div>`;
    } else if(q.type==="reflect"){
      return `<div class="q" data-i="${i}" style="border-color:var(--teal)"><div class="qhead">💡 ${i+1}. ${q.q}</div>
        <textarea name="q${i}" style="min-height:80px" placeholder="Your own ideas — there is no wrong answer…"></textarea>
        <div class="feedback hidden"></div></div>`;
    } else if(q.type==="gap"){
      return `<div class="q" data-i="${i}"><div class="qhead">${i+1}. ${q.q}</div>
        <input type="text" name="q${i}" class="gap-input" autocomplete="off" placeholder="the missing word(s)">
        <div class="feedback hidden"></div></div>`;
    } else {
      return `<div class="q" data-i="${i}"><div class="qhead">${i+1}. ${q.q}</div>
        <textarea name="q${i}" style="min-height:70px" placeholder="Write your answer…"></textarea>
        <div class="feedback hidden"></div></div>`;
    }
  }).join('');
  CURRENT_Q = qs;
}
let CURRENT_Q=[];
function markQuiz(id,skill,title){
  const qs=CURRENT_Q; let auto=0, autoMax=0; const written=[];
  qs.forEach((q,i)=>{
    const qEl=document.querySelector(`.q[data-i="${i}"]`);
    const fb=qEl.querySelector('.feedback');
    fb.classList.remove('hidden');
    if(q.type==="mcq"){
      autoMax++;
      const sel=qEl.querySelector(`input[name="q${i}"]:checked`);
      const chosen = sel? +sel.value : -1;
      qEl.querySelectorAll('.opt').forEach((o,j)=>{
        if(j===q.answer) o.classList.add('correct');
        if(j===chosen && chosen!==q.answer) o.classList.add('wrong');
      });
      if(chosen===q.answer){ auto++; fb.classList.add('good'); fb.textContent="✓ Correct. "+q.exp; }
      else { fb.textContent=(chosen===-1?"No answer chosen. ":"Not quite. ")+q.exp; }
    } else if(q.type==="reflect"){
      const txt=(qEl.querySelector('textarea').value||"").trim();
      if(txt) written.push("Reflection: "+txt);
      fb.classList.add('good');
      fb.innerHTML = txt ? `✓ Thanks for sharing your thinking — your teacher will read this.`
        : `Try writing a sentence or two here. ${q.exp}`;
    } else if(q.type==="gap"){
      autoMax++;
      const inp=qEl.querySelector(`[name="q${i}"]`);
      const got=(inp.value||"").trim();
      const ans=Array.isArray(q.answer)?q.answer:[q.answer];
      const norm=x=>x.toLowerCase().replace(/[.,!?;:'"]/g,'').replace(/\s+/g,' ').trim();
      const ok=ans.some(a=>norm(a)===norm(got));
      if(ok){ auto++; inp.style.borderColor="var(--teal)"; fb.classList.add('good'); fb.textContent="✓ Correct. "+(q.exp||""); }
      else { inp.style.borderColor="var(--coral)"; fb.innerHTML=`Answer: <b>${ans[0]}</b>. ${q.exp||""}`; }
    } else {
      const txt=(qEl.querySelector('textarea').value||"").trim();
      if(txt) written.push("Answer: "+txt);
      fb.innerHTML = `<b>Model answer / answer key:</b> ${q.answer}<br><span style="color:var(--muted)">Hint: ${q.exp}</span>`;
    }
  });
  const pct = autoMax? Math.round(auto/autoMax*100) : null;
  document.getElementById('quizResult').innerHTML =
    `<div class="scorebox"><div class="big">${auto}/${autoMax}</div>
     <div>Auto-marked score${pct!=null?` · ${pct}%`:''}. Written answers are self-marked against the key${written.length?' and shared with your teacher':''}.</div></div>`;
  document.getElementById('submitQ').disabled=true;
  if(SESSION&&SESSION.role==="student"){
    saveResult({date:Date.now(), name:SESSION.name, class:SESSION.class, code:SESSION.code,
      id:SESSION.id, skill, activity:title+(skill==='Reading'?" ("+LEVEL+")":""), score:auto, max:autoMax, percent:pct,
      detail: written.join("  |  ").slice(0,800)});
  }
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

/* =========================================================================
   LISTENING — spelling & dictation (timed, two attempts, reveal on miss)
   ========================================================================= */
let SPELLSTATE=null, _spellTimer=null;
function clearSpellTimer(){ if(_spellTimer){ clearInterval(_spellTimer); _spellTimer=null; } }
function spellTile(key){
  const c=SPELL_BANK[key];
  return `<div class="item-row" style="flex-direction:column;align-items:flex-start">
    <h3 style="font-size:1.15rem;margin:0">${c.label}</h3>
    <div class="meta">${c.sub} · bank of ${c.items.length} ${doneTag('Listening',c.label)}</div>
    <button class="btn sm" style="margin-top:12px" onclick="go('spellQuiz','${key}')">Start round →</button>
  </div>`;
}
function startSpellTimer(total){
  clearSpellTimer();
  let left=total;
  const bar=document.getElementById('spellBar'), cnt=document.getElementById('spellCount');
  if(cnt)cnt.textContent=left; if(bar)bar.style.width='100%';
  _spellTimer=setInterval(()=>{
    left--;
    if(cnt)cnt.textContent=Math.max(left,0);
    if(bar)bar.style.width=(Math.max(left,0)/total*100)+'%';
    if(left<=0){ clearSpellTimer(); submitSpell(true); }
  },1000);
}
function renderSpell(){
  clearSpellTimer();
  const s=SPELLSTATE;
  if(s.i>=s.items.length){ finishSpell(); return; }
  const item=s.items[s.i];
  const isSentence=s.type==='sentence';
  const t=SPELL_TIME[s.type][s.attempt===1?'a1':'a2'];
  app().innerHTML=`
  <div class="wrap screen">
    <button class="back" onclick="go('listening')">← Listening</button>
    <h1 style="font-size:1.7rem">🎧 ${s.label}</h1>
    <p style="color:var(--muted)">Item ${s.i+1} of ${s.items.length} · Correct so far: ${s.first+s.second}</p>
    <div class="card" style="max-width:620px">
      <div class="spell-timer"><div class="spell-bar" id="spellBar"></div><span id="spellCount">${t}</span></div>
      <p style="text-align:center;font-weight:600;color:${s.attempt===2?'var(--coral-dk)':'var(--muted)'}">${s.attempt===1?'Attempt 1 of 2':'Attempt 2 — be quick!'}</p>
      <div style="text-align:center;margin:10px 0"><button class="btn dark" onclick="speakItem()">🔊 Play again</button></div>
      ${item.hint?`<p class="note" style="text-align:center">Meaning: ${item.hint}</p>`:''}
      ${isSentence?`<p style="text-align:center;font-size:.82rem;color:var(--muted)">Capital letters and punctuation count.</p>`:''}
      <div class="field"><label>Type exactly what you hear</label>
        <input id="spellIn" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Type here…" onkeydown="if(event.key==='Enter')submitSpell(false)"></div>
      <div class="err" id="spellFb"></div>
      <button class="btn teal" onclick="submitSpell(false)">Submit</button>
    </div>
  </div>`;
  setTimeout(()=>{ const inp=document.getElementById('spellIn'); if(inp)inp.focus(); speakItem(); startSpellTimer(t); },250);
}
function speakItem(){ if(!SPELLSTATE)return; stopSpeak(); speak(SPELLSTATE.items[SPELLSTATE.i].t); }
function checkSpelling(answer, got, type){
  if(type==='sentence'){ const n=x=>x.replace(/\s+/g,' ').trim(); return n(got)===n(answer); }
  const n=x=>x.toLowerCase().replace(/[.,!?;:'"]/g,'').replace(/\s+/g,' ').trim();
  return n(got)===n(answer);
}
function submitSpell(timedOut){
  clearSpellTimer();
  const s=SPELLSTATE; const item=s.items[s.i];
  const got=(val('spellIn')||"").trim();
  const fb=document.getElementById('spellFb');
  if(checkSpelling(item.t, got, s.type)){
    if(s.attempt===1) s.first++; else s.second++;
    s.log.push({t:item.t, got, ok:true, attempt:s.attempt});
    if(fb){ fb.style.color="var(--teal-dk)"; fb.textContent="✓ Correct!"; }
    setTimeout(nextSpell, 800);
    return;
  }
  if(s.attempt===1){
    s.attempt=2;
    if(fb){ fb.style.color="var(--coral-dk)"; fb.textContent=timedOut?"⏱ Time's up — one more try…":"Not quite — one more try…"; }
    setTimeout(renderSpell, 900);
  } else {
    s.missed++;
    s.log.push({t:item.t, got, ok:false, attempt:2});
    revealSpell(item.t);
  }
}
function revealSpell(correct){
  clearSpellTimer();
  app().innerHTML=`<div class="wrap screen"><button class="back" onclick="go('listening')">← Listening</button>
    <div class="card" style="max-width:620px;text-align:center;margin-top:10px">
      <p style="color:var(--coral-dk);font-weight:600;margin:0">The correct spelling was:</p>
      <div class="dictate-display">${esc(correct)}</div>
      <p style="color:var(--muted);margin:0">Next item in <span id="revCount">${SPELL_REVEAL}</span>s…</p>
      <button class="btn ghost sm" style="margin-top:12px" onclick="nextSpell()">Skip ahead</button>
    </div></div>`;
  let left=SPELL_REVEAL;
  _spellTimer=setInterval(()=>{ left--; const c=document.getElementById('revCount'); if(c)c.textContent=Math.max(left,0); if(left<=0){ clearSpellTimer(); nextSpell(); } },1000);
}
function nextSpell(){ clearSpellTimer(); const s=SPELLSTATE; if(!s)return; s.i++; s.attempt=1; renderSpell(); }
function finishSpell(){
  clearSpellTimer();
  const s=SPELLSTATE; const N=s.items.length;
  const pct=Math.round((s.first + 0.5*s.second)/N*100);
  app().innerHTML=`<div class="wrap screen"><button class="back" onclick="go('listening')">← Listening</button>
    <div class="scorebox" style="max-width:520px;margin:24px auto"><div class="big">${pct}%</div>
      <div>${s.first} right first try · ${s.second} on the second · ${s.missed} missed</div>
      <div style="opacity:.85;font-size:.9rem;margin-top:6px">${pct>=80?'Excellent — that bank is getting easy. Try a longer round!':pct>=50?'Good progress. Run it again for fresh items.':'Keep going — every round pulls new words.'}</div></div>
    <div style="text-align:center;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn" onclick="go('spellQuiz','${s.key}')">New round (fresh items)</button>
      <button class="btn ghost" onclick="go('listening')">Back to listening</button>
    </div></div>`;
  if(SESSION&&SESSION.role==="student"){
    saveResult({date:Date.now(),name:SESSION.name,class:SESSION.class,code:SESSION.code,id:SESSION.id,
      skill:"Listening",activity:s.label+" (spelling round)",score:(s.first+s.second),max:N,percent:pct,
      detail:`first-try ${s.first}, second-try ${s.second}, missed ${s.missed}`});
  }
}

      </div>

let REC=null, REC_TARGET=null;
function startRec(i,k){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  const status=document.getElementById(`recStatus_${i}_${k}`);
  if(!SR){ status.textContent="Speech-to-text isn't supported in this browser — try Chrome. You can still speak aloud and self-assess."; return; }
  stopRec();
  REC=new SR(); REC.continuous=true; REC.interimResults=true; REC.lang='en-US';
  REC_TARGET=document.getElementById(`trans_${i}_${k}`); REC_TARGET.textContent="";
  status.textContent="● Listening…";
  let finalT="";
  REC.onresult=e=>{ let interim=""; for(let n=e.resultIndex;n<e.results.length;n++){ const t=e.results[n][0].transcript; if(e.results[n].isFinal) finalT+=t+" "; else interim+=t; } REC_TARGET.textContent=finalT+interim; };
  REC.onerror=e=>{ status.textContent="Mic error: "+e.error; };
  REC.onend=()=>{ status.textContent="■ Stopped"; };
  try{ REC.start(); }catch(e){ status.textContent="Couldn't start — check microphone permission."; }
}
function stopRec(){ if(REC){ try{REC.stop();}catch(e){} REC=null; } }
function saveSpeaking(i,k,cat){
  const t=document.getElementById(`trans_${i}_${k}`).textContent.trim();
  const words=t&&t!=="Your spoken words will appear here…"? t.split(/\s+/).filter(Boolean).length : 0;
  const fileEl=document.getElementById(`ppt_${i}_${k}`); const file=fileEl&&fileEl.files[0];
  if(SESSION&&SESSION.role==="student"){
    saveResult({date:Date.now(),name:SESSION.name,class:SESSION.class,code:SESSION.code,id:SESSION.id,
      skill:"Speaking",activity:cat,score:null,max:null,percent:null,
      detail:`${words} spoken words`+(file?`, slides: ${file.name}`:'')});
  }
  document.getElementById(`spkSaved_${i}_${k}`).textContent=`✓ Saved (${words} words${file?', slides attached':''})`;
}

function renderCodeList(){
  const el=document.getElementById('codeList'); if(!el) return;
  el.innerHTML=getCodes().map(c=>`<span class="pill">${esc(c)} <span style="cursor:pointer;color:var(--coral)" onclick="removeCode('${esc(c)}')">✕</span></span>`).join('');
}
function addCode(){ const v=val('newCode').trim().toUpperCase(); if(!v) return; const c=getCodes(); if(!c.includes(v)){ c.push(v); Store.set('ican_codes',c);} document.getElementById('newCode').value=''; renderCodeList(); }
function removeCode(c){ Store.set('ican_codes', getCodes().filter(x=>x!==c)); renderCodeList(); }
function saveFeedback(key){ setStudent(key,{feedback:val('fb_'+key)}); const b=event.target; b.textContent="Saved ✓"; setTimeout(()=>b.textContent="Save",1200); }
function summariseStudents(res){
  const map={};
  res.forEach(r=>{ const k=r.id||(r.code+"::"+(r.name||'').toLowerCase()); if(!map[k]) map[k]={key:k,name:r.name,class:r.class,attempts:0,pctSum:0,pctN:0,skills:new Set()};
    map[k].attempts++; map[k].skills.add(r.skill); if(r.percent!=null){ map[k].pctSum+=r.percent; map[k].pctN++; } });
  return Object.values(map).map(s=>({key:s.key,name:s.name,class:s.class,attempts:s.attempts,avg:s.pctN?Math.round(s.pctSum/s.pctN):'—',skills:[...s.skills]}));
}
function exportExcel(){
  const res=allResults(); const students=getStudents();
  const wb=XLSX.utils.book_new();
  // 1) Student bios + feedback
  const bioRows=Object.entries(students).map(([k,v])=>({Code:v.code||'',Name:v.name||'',Class:v.class||'',Feedback_Intervention:v.feedback||''}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(bioRows.length?bioRows:[{Code:'',Name:'',Class:'',Feedback_Intervention:''}]), "Learners");
  // 2) All attempts
  const attemptRows=res.map(r=>({Date:new Date(r.date).toLocaleString(),Name:r.name,Class:r.class,Code:r.code,Skill:r.skill,Activity:r.activity,Score:r.score==null?'':r.score,Max:r.max==null?'':r.max,Percent:r.percent==null?'':r.percent,Detail:r.detail||''}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(attemptRows.length?attemptRows:[{Date:'',Name:'',Class:'',Code:'',Skill:'',Activity:'',Score:'',Max:'',Percent:'',Detail:''}]), "All attempts");
  // 3) Summary
  const sum=summariseStudents(res).map(s=>({Name:s.name,Class:s.class,Attempts:s.attempts,Avg_percent:s.avg,Skills:s.skills.join(', '),Feedback:(students[s.key]?.feedback)||''}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sum.length?sum:[{Name:'',Class:'',Attempts:'',Avg_percent:'',Skills:'',Feedback:''}]), "Summary");
  XLSX.writeFile(wb, "iCAN-results-"+new Date().toISOString().slice(0,10)+".xlsx");
}

/* =========================================================================
   STUDENT result helpers
   ========================================================================= */
function myResultsTable(){
  if(!SESSION) return "";
  const mine=allResults().filter(r=>r.id===SESSION.id || (r.code===SESSION.code && (r.name||'').toLowerCase()===SESSION.name.toLowerCase()));
  if(!mine.length) return `<p class="note">Nothing yet — complete an activity and your progress will show here.</p>`;
  return `<div style="overflow:auto"><table class="data">
    <tr><th>When</th><th>Skill</th><th>Activity</th><th>Score</th></tr>
    ${mine.slice().reverse().slice(0,12).map(r=>`<tr><td style="font-size:.78rem">${new Date(r.date).toLocaleDateString()}</td><td>${r.skill}</td><td style="font-size:.82rem">${esc(r.activity)}</td><td>${r.percent!=null?r.percent+'%':(r.detail||'saved')}</td></tr>`).join('')}
  </table></div>`;
}
function doneTag(skill,title){
  if(!SESSION) return "";
  const done=getResults().some(r=>r.id===SESSION.id&&r.skill===skill&&r.activity.indexOf(title)===0);
  return done?`<span class="pill done">✓ done</span>`:"";
}

/* =========================================================================
   LEVEL SLIDER  (re-renders the current screen — no fragile arg threading)
   ========================================================================= */
function levelSliderHTML(){
  return `<div class="level-slider" data-level="${LEVEL}" role="group" aria-label="Reading level">
    <button onclick="setLevel('standard')" aria-pressed="${LEVEL==='standard'}">Standard</button>
    <button onclick="setLevel('scaffolded')" aria-pressed="${LEVEL==='scaffolded'}">Supported · SEN / abridged</button>
    <span class="knob"></span>
  </div>`;
}
function setLevel(l){ LEVEL=l; go(CURRENT_SCREEN, CURRENT_ARG); }

/* =========================================================================
   ACCESSIBILITY
   ========================================================================= */
let FONT=1;
function setFont(d){ if(d===0) FONT=1; else FONT=Math.min(1.8,Math.max(.8,FONT+d)); document.documentElement.style.setProperty('--fs',FONT); }
function toggleA11y(){ document.getElementById('a11yPanel').classList.toggle('hidden'); }
function toggleClassBody(cls,btn){ document.body.classList.toggle(cls); const b=document.getElementById(btn); if(b)b.classList.toggle('on'); }
let HL=false;
function toggleHighlighter(){ HL=!HL; document.querySelectorAll('#cHl,#hlBtn2').forEach(b=>b&&b.classList.toggle('on',HL)); document.body.style.cursor=HL?'text':''; }
function turnOffHighlighter(){ HL=false; document.querySelectorAll('#cHl,#hlBtn2').forEach(b=>b&&b.classList.remove('on')); document.body.style.cursor=''; }
document.addEventListener('mouseup',()=>{
  if(!HL) return;
  const sel=window.getSelection(); if(!sel.rangeCount||sel.isCollapsed) return;
  try{ const r=sel.getRangeAt(0); const m=document.createElement('mark'); m.className='user-hl'; r.surroundContents(m); sel.removeAllRanges(); }catch(e){}
});
function clearHighlights(){ document.querySelectorAll('mark.user-hl').forEach(m=>{ const p=m.parentNode; while(m.firstChild)p.insertBefore(m.firstChild,m); p.removeChild(m); p.normalize&&p.normalize(); }); }

/* Text-to-speech */
function speak(text){ if(!('speechSynthesis'in window))return; const u=new SpeechSynthesisUtterance(text); u.lang='en-GB'; u.rate=.95; speechSynthesis.speak(u); }
function stopSpeak(){ if('speechSynthesis'in window) speechSynthesis.cancel(); }
function readPage(){ readSelector('readBody')||readSelector('app'); }
function readSelector(id){ const el=document.getElementById(id); if(!el)return false; stopSpeak(); speak(el.innerText.slice(0,4000)); return true; }

/* =========================================================================
   UTIL
   ========================================================================= */
function val(id){ const e=document.getElementById(id); return e?e.value:""; }
function escq(s){ return (s||"").replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* boot */
go('home');
</script>
