<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iCAN · English Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --ink:#15183A; --ink-2:#232a5c; --paper:#FBFAF6; --card:#FFFFFF;
  --coral:#FF5A5F; --coral-dk:#E6464B; --amber:#FFD23F; --teal:#0FA98B; --teal-dk:#0c8a72;
  --mist:#E7E6F0; --line:#D9D8E6; --slate:#3A3F58; --muted:#6E7290;
  --hl:#FFE066; --radius:16px; --shadow:0 10px 30px -12px rgba(21,24,58,.25);
  --fs:1; /* accessibility font scale */ --ls:1.6; /* line spacing */
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:var(--paper); color:var(--slate);
  font-family:"Lexend",system-ui,sans-serif; line-height:var(--ls);
  font-size:calc(16px * var(--fs)); -webkit-font-smoothing:antialiased;
}
body.dyslexia{ letter-spacing:.04em; word-spacing:.16em; --ls:1.9; font-weight:400; }
body.contrast{ --paper:#fff; --slate:#000; --muted:#222; --line:#000; --card:#fff;}
h1,h2,h3,.display{font-family:"Fraunces",Georgia,serif; color:var(--ink); line-height:1.1; margin:0;}
a{color:var(--coral)}
button{font-family:inherit; cursor:pointer; font-size:1rem}
.hidden{display:none !important}

/* ---------- layout ---------- */
.wrap{max-width:1080px; margin:0 auto; padding:0 20px}
.screen{min-height:100vh; padding:90px 0 80px}
.center{display:flex; align-items:center; justify-content:center; min-height:100vh; padding:80px 20px}

/* ---------- top bar ---------- */
.topbar{position:fixed; top:0; left:0; right:0; height:62px; background:rgba(251,250,246,.9);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--line); z-index:50;
  display:flex; align-items:center; justify-content:space-between; padding:0 20px}
.brand{display:flex; align-items:center; gap:10px; font-family:"Fraunces"; font-weight:700; font-size:1.35rem; color:var(--ink)}
.brand .dot{display:inline-block; background:var(--amber); border-radius:4px; padding:0 .25em; box-shadow:inset 0 -6px 0 rgba(0,0,0,.06)}
.brand small{font-family:"Lexend"; font-weight:400; color:var(--muted); font-size:.7rem; letter-spacing:.18em; text-transform:uppercase}
.who{display:flex; align-items:center; gap:12px; font-size:.85rem; color:var(--muted)}
.who b{color:var(--ink)}

/* ---------- accessibility toolbar ---------- */
.a11y{position:fixed; right:14px; bottom:14px; z-index:60; display:flex; flex-direction:column; gap:8px; align-items:flex-end}
.a11y-toggle{background:var(--ink); color:#fff; border:none; border-radius:50px; padding:11px 16px; box-shadow:var(--shadow); display:flex; gap:8px; align-items:center; font-weight:500}
.a11y-panel{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px; box-shadow:var(--shadow); display:grid; gap:8px; width:230px}
.a11y-panel h4{font-family:"Lexend"; font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:2px 0 0}
.a11y-row{display:flex; gap:6px; flex-wrap:wrap}
.chip{border:1px solid var(--line); background:#fff; border-radius:9px; padding:7px 10px; font-size:.8rem; color:var(--slate); flex:1; min-width:42px; text-align:center}
.chip.on{background:var(--ink); color:#fff; border-color:var(--ink)}

/* ---------- buttons ---------- */
.btn{background:var(--coral); color:#fff; border:none; border-radius:12px; padding:13px 22px; font-weight:600; box-shadow:0 6px 16px -6px rgba(255,90,95,.6); transition:transform .12s ease, filter .12s}
.btn:hover{filter:brightness(1.05)} .btn:active{transform:translateY(1px)}
.btn.ghost{background:#fff; color:var(--ink); border:1.5px solid var(--line); box-shadow:none}
.btn.dark{background:var(--ink); box-shadow:none}
.btn.teal{background:var(--teal); box-shadow:0 6px 16px -6px rgba(15,169,139,.6)}
.btn.sm{padding:8px 14px; font-size:.85rem; border-radius:10px}
.btn:disabled{opacity:.5; cursor:not-allowed}

/* ---------- cards ---------- */
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow)}
.grid{display:grid; gap:18px}
@media(min-width:720px){ .grid.c2{grid-template-columns:1fr 1fr} .grid.c4{grid-template-columns:repeat(2,1fr)} }
@media(min-width:980px){ .grid.c4{grid-template-columns:repeat(4,1fr)} }

/* ---------- home ---------- */
.hero{text-align:center; max-width:640px}
.hero .kicker{font-family:"Lexend"; letter-spacing:.22em; text-transform:uppercase; font-size:.72rem; color:var(--muted); margin-bottom:14px}
.hero h1{font-size:clamp(2.6rem,7vw,4.4rem); font-weight:600}
.mark{background:linear-gradient(transparent 60%, var(--hl) 60%); padding:0 .08em}
.hero p{color:var(--muted); font-size:1.05rem; margin:18px auto 30px; max-width:480px}
.role-grid{display:grid; gap:16px; grid-template-columns:1fr; max-width:520px; margin:0 auto}
@media(min-width:560px){ .role-grid{grid-template-columns:1fr 1fr} }
.role{cursor:pointer; text-align:left; border:1.5px solid var(--line); background:#fff; border-radius:var(--radius); padding:22px; transition:.15s; display:block}
.role:hover{border-color:var(--ink); transform:translateY(-3px)}
.role .ic{font-size:1.8rem} .role h3{margin:10px 0 4px; font-size:1.3rem} .role p{margin:0; color:var(--muted); font-size:.9rem}

/* ---------- forms ---------- */
.field{display:block; margin-bottom:14px; text-align:left}
.field label{display:block; font-size:.8rem; color:var(--muted); margin-bottom:6px; font-weight:500}
.field input, .field select, textarea{width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:11px; font-family:inherit; font-size:1rem; color:var(--ink); background:#fff}
.field input:focus, textarea:focus, select:focus{outline:none; border-color:var(--coral)}
textarea{min-height:150px; resize:vertical; line-height:1.6}
.err{color:var(--coral-dk); font-size:.85rem; margin-top:8px; min-height:1.2em}

/* ---------- pathway ---------- */
.path{cursor:pointer; text-align:left; border:none; border-radius:var(--radius); padding:24px; color:#fff; min-height:150px; display:flex; flex-direction:column; justify-content:space-between; transition:.15s; position:relative; overflow:hidden}
.path:hover{transform:translateY(-4px)}
.path .ic{font-size:2rem} .path h3{color:#fff; font-size:1.4rem; margin-top:10px} .path span{font-size:.82rem; opacity:.85}
.path.read{background:linear-gradient(135deg,#2b2f63,#15183A)}
.path.write{background:linear-gradient(135deg,#E6464B,#FF7A5F)}
.path.listen{background:linear-gradient(135deg,#0FA98B,#1ec6a4)}
.path.speak{background:linear-gradient(135deg,#8B5CF6,#6D3FD6)}

/* ---------- reading ---------- */
.level-slider{position:relative; display:inline-flex; background:#fff; border:1.5px solid var(--line); border-radius:50px; padding:5px; user-select:none}
.level-slider button{position:relative; z-index:2; border:none; background:none; border-radius:50px; padding:9px 18px; font-size:.85rem; font-weight:600; color:var(--muted); transition:color .25s; white-space:nowrap}
.level-slider .knob{position:absolute; top:5px; bottom:5px; left:5px; width:90px; border-radius:50px; background:var(--ink); transition:left .3s cubic-bezier(.34,1.4,.5,1), width .3s, background .25s; z-index:1}
.level-slider[data-level="scaffolded"] .knob{background:var(--teal)}
.level-slider[data-level="standard"] button:first-of-type{color:#fff}
.level-slider[data-level="scaffolded"] button:last-of-type{color:#fff}
.passage{font-family:"Lexend"; max-width:680px}
.passage p{margin:0 0 1em} .passage h3{font-size:1.7rem; margin:0 0 6px}
.genre-tag{display:inline-block; font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:var(--coral-dk); font-weight:600; margin-bottom:4px}
.reader-tools{display:flex; gap:8px; flex-wrap:wrap; margin:14px 0 20px; padding:12px; background:#fff; border:1px solid var(--line); border-radius:12px}
mark.user-hl{background:var(--hl); padding:0 1px; border-radius:2px}
.figure{border:1px solid var(--line); border-radius:12px; padding:16px; background:#fff; margin:16px 0}
.figure table{width:100%; border-collapse:collapse; font-family:"Lexend"; font-size:.9rem}
.figure th,.figure td{border:1px solid var(--line); padding:8px 10px; text-align:left}
.figure th{background:var(--mist); color:var(--ink)}
.figure figcaption{font-size:.8rem; color:var(--muted); margin-top:8px}
.bar{height:14px; background:var(--coral); border-radius:4px; margin:4px 0}

/* ---------- quiz ---------- */
.q{border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:12px; background:#fff}
.q .qhead{font-weight:500; color:var(--ink); margin-bottom:10px}
.opt{display:flex; gap:10px; align-items:flex-start; padding:9px 12px; border:1.5px solid var(--line); border-radius:10px; margin-bottom:8px; cursor:pointer}
.opt:hover{border-color:var(--ink)}
.opt input{margin-top:3px}
.opt.correct{border-color:var(--teal); background:rgba(15,169,139,.08)}
.opt.wrong{border-color:var(--coral); background:rgba(255,90,95,.08)}
.feedback{font-size:.85rem; margin-top:6px; padding:8px 10px; border-radius:8px; background:var(--mist)}
.feedback.good{background:rgba(15,169,139,.12); color:var(--teal-dk)}
.scorebox{text-align:center; padding:22px; border-radius:14px; background:var(--ink); color:#fff; margin-top:10px}
.scorebox .big{font-family:"Fraunces"; font-size:3rem; color:#fff}

/* ---------- lists / misc ---------- */
.item-row{display:flex; justify-content:space-between; gap:12px; align-items:center; padding:16px; border:1px solid var(--line); border-radius:12px; background:#fff; margin-bottom:10px}
.item-row .meta{font-size:.82rem; color:var(--muted)}
.pill{display:inline-block; font-size:.7rem; padding:3px 9px; border-radius:50px; background:var(--mist); color:var(--ink); font-weight:500}
.pill.done{background:rgba(15,169,139,.15); color:var(--teal-dk)}
.back{background:none; border:none; color:var(--muted); padding:0; margin-bottom:18px; font-size:.9rem}
.section-title{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px; margin-bottom:22px}
.rubric{list-style:none; padding:0; margin:14px 0}
.rubric li{display:flex; gap:10px; padding:8px 0; border-bottom:1px dashed var(--line); font-size:.92rem}
.rubric input{margin-top:4px}
.note{font-size:.85rem; color:var(--muted); background:var(--mist); padding:12px 14px; border-radius:10px}
.dictate-display{font-size:2rem; font-family:"Fraunces"; text-align:center; padding:20px; letter-spacing:.05em; color:var(--ink)}
.spell-timer{position:relative; height:10px; background:var(--mist); border-radius:50px; margin:24px 0 16px}
.spell-bar{height:100%; background:var(--coral); border-radius:50px; width:100%; transition:width 1s linear}
.spell-timer span{position:absolute; right:0; top:-24px; font-weight:700; color:var(--ink); font-family:"Fraunces"; font-size:1.2rem}
.gap-input{display:inline-block; width:auto; min-width:160px; padding:8px 12px; border:1.5px solid var(--line); border-radius:10px; font-family:inherit; font-size:1rem}
.audio-player{display:flex; gap:10px; align-items:center; flex-wrap:wrap; padding:16px; background:var(--ink); border-radius:14px; margin:14px 0}
.audio-player .btn{box-shadow:none}
.audio-player .label{color:#fff; font-size:.85rem}
.card ul{margin:8px 0 0; padding-left:20px} .card ul li{margin-bottom:6px; font-size:.92rem}
.bands{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:12px 0}
details.script{margin-top:10px; border:1px dashed var(--line); border-radius:10px; padding:10px 14px; background:#fff}
details.script summary{cursor:pointer; color:var(--muted); font-size:.85rem}
h2.sub{font-size:1.4rem; margin:30px 0 4px}
.transcript{min-height:80px; border:1px dashed var(--line); border-radius:10px; padding:14px; background:#fff; font-style:italic; color:var(--slate)}
table.data{width:100%; border-collapse:collapse; font-size:.85rem; margin-top:14px}
table.data th, table.data td{border:1px solid var(--line); padding:9px 11px; text-align:left}
table.data th{background:var(--ink); color:#fff; position:sticky; top:0}
table.data tr:nth-child(even){background:#fff}
.kbd{font-family:monospace; background:var(--ink); color:var(--amber); padding:2px 8px; border-radius:6px; font-size:.85em}
.tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:18px}
.tabs button{border:1.5px solid var(--line); background:#fff; border-radius:50px; padding:8px 16px; font-size:.85rem; color:var(--muted)}
.tabs button.on{background:var(--coral); color:#fff; border-color:var(--coral)}
@media (prefers-reduced-motion: reduce){*{transition:none !important; scroll-behavior:auto}}
/* ---- writing course ---- */
.lvl-tabs{display:flex; gap:8px; flex-wrap:wrap; margin:18px 0}
.lvl-tabs button{border:1.5px solid var(--line); background:#fff; border-radius:12px; padding:12px 18px; font-weight:600; color:var(--muted)}
.lvl-tabs button.on{background:var(--ink); color:#fff; border-color:var(--ink)}
.unit{border:1px solid var(--line); border-radius:14px; background:#fff; margin-bottom:14px; overflow:hidden}
.unit h3{font-family:"Lexend"; font-size:1.05rem; padding:16px 18px; margin:0; background:var(--mist); color:var(--ink)}
.unit .lesson-row{display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px 18px; border-top:1px solid var(--line)}
.unit .lesson-row .t{font-weight:500; color:var(--ink)}
.unit .lesson-row .ty{font-size:.78rem; color:var(--muted)}
.progress{height:8px; background:var(--mist); border-radius:50px; overflow:hidden; margin:6px 0 0}
.progress span{display:block; height:100%; background:var(--teal); border-radius:50px}
.teach{background:#fff; border:1px solid var(--line); border-left:4px solid var(--teal); border-radius:10px; padding:16px 18px; margin:14px 0}
.teach ul{margin:8px 0 0; padding-left:20px} .teach li{margin-bottom:6px}
.fb-band{display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:8px; font-weight:700; color:#fff; font-family:"Fraunces"}
.b4{background:var(--teal)} .b3{background:#3DA35D} .b2{background:#E0A100} .b1{background:var(--coral)}
.fb-row{display:flex; gap:12px; padding:12px 0; border-bottom:1px dashed var(--line); align-items:flex-start}
.fb-row .body b{color:var(--ink)} .fb-row .body{font-size:.9rem}
.vocab-card{display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px; border:1px solid var(--line); border-radius:12px; background:#fff; margin-bottom:10px}
.vocab-card .w{font-weight:600; color:var(--ink); font-size:1.05rem}
.vocab-card .s{font-size:.85rem; color:var(--muted); font-style:italic}
.rec-dot{display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--coral); margin-right:6px; animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.badge-done{background:rgba(15,169,139,.15); color:var(--teal-dk); font-weight:600; font-size:.78rem; padding:4px 10px; border-radius:50px}
.vocab-mini{border:1.5px dashed var(--teal); border-radius:12px; padding:16px; background:rgba(15,169,139,.05); margin:18px 0}
.mcq-slot{border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:10px; background:#fff}
.mcq-slot .opt-row{display:flex; gap:6px; flex-wrap:wrap; margin:6px 0}
.mcq-slot .opt-row input{flex:1; min-width:130px}
.ed-field{margin-bottom:10px}
.ed-field label{display:block; font-size:.8rem; color:var(--muted); margin-bottom:4px; font-weight:500}
.ed-field input,.ed-field select,.ed-field textarea{width:100%; padding:9px 11px; border:1.5px solid var(--line); border-radius:9px; font-family:inherit; font-size:.95rem; color:var(--ink); background:#fff}
.ed-grid{display:grid; gap:10px}
@media(min-width:680px){ .ed-grid.two{grid-template-columns:1fr 1fr} }
.tool-check{display:flex; gap:8px; align-items:flex-start; padding:8px 10px; border:1px solid var(--line); border-radius:8px; margin-bottom:6px; font-size:.85rem}
.pbar{height:14px; background:var(--mist); border-radius:50px; overflow:hidden; margin:4px 0}
.pbar span{display:block; height:100%; border-radius:50px; transition:width .5s ease}
.prow{margin-bottom:14px}
.prow .lab{display:flex; justify-content:space-between; gap:10px; font-size:.9rem; margin-bottom:3px}
.prow .lab b{color:var(--ink)}
.prow .lab span{color:var(--muted); font-size:.82rem}
.statline{display:flex; gap:12px; flex-wrap:wrap; margin:10px 0}
.stat{background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 18px; min-width:110px; text-align:center; flex:1}
.stat .n{font-family:"Fraunces"; font-size:1.7rem; color:var(--ink); line-height:1}
.stat .l{font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-top:4px}
.exam-timer{background:var(--ink); color:#fff; font-weight:700; padding:8px 16px; border-radius:50px; font-size:1.05rem; font-variant-numeric:tabular-nums; transition:background .4s}
</style>
</head>
<body>

<!-- ============ TOP BAR ============ -->
<div class="topbar">
  <div class="brand" onclick="go('home')" style="cursor:pointer">
    <span>i<span class="dot">CAN</span></span>
    <small>English Practice</small>
  </div>
  <div class="who" id="whoBar"></div>
</div>

<!-- ============ ACCESSIBILITY TOOLBAR ============ -->
<div class="a11y">
  <div class="a11y-panel hidden" id="a11yPanel">
    <h4>Text size</h4>
    <div class="a11y-row">
      <button class="chip" onclick="setFont(-0.1)">A−</button>
      <button class="chip" onclick="setFont(0)">Reset</button>
      <button class="chip" onclick="setFont(0.1)">A+</button>
    </div>
    <h4>Reading support</h4>
    <div class="a11y-row">
      <button class="chip" id="cDys" onclick="toggleClassBody('dyslexia','cDys')">Easy-read font</button>
      <button class="chip" id="cCon" onclick="toggleClassBody('contrast','cCon')">High contrast</button>
    </div>
    <div class="a11y-row">
      <button class="chip" id="cHl" onclick="toggleHighlighter()">✏️ Highlighter</button>
      <button class="chip" onclick="clearHighlights()">Clear marks</button>
    </div>
    <h4>Read to me</h4>
    <div class="a11y-row">
      <button class="chip" onclick="readPage()">▶ Play</button>
      <button class="chip" onclick="stopSpeak()">■ Stop</button>
    </div>
  </div>
  <button class="a11y-toggle" onclick="toggleA11y()">♿ Tools</button>
</div>

<!-- ============ SCREENS MOUNT ============ -->
<main id="app"></main>

<script>
/* =========================================================================
   iCAN — configuration you can change
   ========================================================================= */
const CONFIG = {
  teacherCode: "iCAN2",      // <-- change this and keep it private
  // Student access codes you hand out. Edit freely, or add them from the
  // Teacher dashboard (those are saved in this browser).
  classCodes: ["DEMO"],
  // Online sync (optional). Paste your Google Sheet web-app URL here, OR set it
  // from the Teacher dashboard. When set, every result is saved online and the
  // teacher dashboard reads everyone's records from the cloud. Leave "" for
  // local-only mode (still fully works + Excel export).
  cloudUrl: ""
};

/* =========================================================================
   Storage — uses the browser when hosted; falls back to memory in preview.
   When you add a backend later, replace these 4 functions with fetch() calls.
   ========================================================================= */
const Store = {
  mem:{},
  _ok(){ try{ const k="__t"; localStorage.setItem(k,"1"); localStorage.removeItem(k); return true; }catch(e){ return false; } },
  get(k){ if(this._ok()){ const v=localStorage.getItem(k); return v?JSON.parse(v):null; } return this.mem[k]??null; },
  set(k,v){ if(this._ok()){ localStorage.setItem(k,JSON.stringify(v)); } else { this.mem[k]=v; } }
};
function getResults(){ return Store.get("ican_results")||[]; }
function getCodes(){ const stored=Store.get("ican_codes")||[]; return Array.from(new Set([...(CONFIG.classCodes||[]), ...stored])); }
function saveResult(r){ const a=getResults(); a.push(r); Store.set("ican_results",a); cloudSave(r); }
function getStudents(){ return Store.get("ican_students")||{}; }
function setStudent(id,o){ const s=getStudents(); s[id]=Object.assign(s[id]||{},o); Store.set("ican_students",s); }

/* ---- Online sync (Google Sheet web app). Local always works as a backup. ---- */
function cloudUrl(){ return Store.get("ican_cloud_url") || CONFIG.cloudUrl || ""; }
function setCloudUrl(u){ Store.set("ican_cloud_url", u.trim()); }
function cloudSave(rec){
  const url = cloudUrl(); if(!url) return;
  try{ fetch(url, {method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(rec)}); }
  catch(e){ /* offline; local copy is kept */ }
}
let _cbN = 0, CLOUD_CACHE = [];
function cloudList(cb){
  const url = cloudUrl(); if(!url){ cb(null); return; }
  const name = "__icanCb" + (++_cbN);
  const s = document.createElement("script");
  let done = false;
  window[name] = function(data){ done=true; try{ s.remove(); }catch(e){} delete window[name]; cb(data); };
  s.onerror = ()=>{ if(!done){ try{ s.remove(); }catch(e){} cb(null); } };
  s.src = url + (url.includes("?")?"&":"?") + "action=list&callback=" + name + "&t=" + Date.now();
  document.body.appendChild(s);
  setTimeout(()=>{ if(!done){ try{ s.remove(); }catch(e){} cb(null); } }, 8000);
}
function rkey(r){ return r.date+"|"+(r.name||"")+"|"+(r.activity||"")+"|"+(r.skill||""); }
function allResults(){
  const local = getResults(); const seen = new Set(local.map(rkey)); const merged = local.slice();
  CLOUD_CACHE.forEach(r=>{ if(r && !seen.has(rkey(r))){ seen.add(rkey(r)); merged.push(r); } });
  return merged.sort((a,b)=>a.date-b.date);
}
function refreshCloud(then){ cloudList(data=>{ if(Array.isArray(data)) CLOUD_CACHE = data; if(then) then(); }); }

/* ---- Listening B: spelling & dictation. Timed, two attempts, big bank, fresh each round ---- */
const SPELL_TIME   = { word:{a1:10,a2:6}, phrase:{a1:14,a2:8}, sentence:{a1:22,a2:14} };
function spellTime(type, attempt, text){
  if(type==="sentence"){
    const words=(text||"").trim().split(/\s+/).filter(Boolean).length;
    const a1=Math.min(40, Math.max(22, Math.round(words*2.2)));  // 22s floor, ~2.2s/word, 40s cap
    return attempt===1 ? a1 : Math.round(a1*0.65);
  }
  if(type==="phrase"){
    const words=(text||"").trim().split(/\s+/).filter(Boolean).length;
    const a1=Math.max(14, Math.round(words*3));
    return attempt===1 ? a1 : Math.round(a1*0.6);
  }
  return SPELL_TIME.word[attempt===1?"a1":"a2"];
}

       model:"<p>Fast fashion offers cheap, trendy clothes — but its true cost is paid by the planet and by garment workers. It should be heavily restricted, if not banned.</p><p>The environmental case is overwhelming. The industry is among the world's largest polluters, and the rivers near textile factories often run the colour of the season's trend. Cheap clothes are designed to be discarded, filling landfills within months.</p><p>Some argue that banning fast fashion would harm the workers who depend on it for income. This concern is real and serious. However, the answer is not to defend an exploitative system but to replace it with fairer, better-paid manufacturing — protecting both people and the environment, rather than sacrificing one for the other.</p><p>Convenience cannot keep outweighing consequence. If we are willing to pay a little more and buy a little less, we can dress ourselves without undressing the planet.</p>"},
      {id:"a32", title:"Informational / explanatory writing", type:"Essay · informational", rubricKey:"informational", minWords:200,
       teach:["Informational writing <b>explains</b> a topic clearly and <b>objectively</b> — it informs, it doesn't argue.",
              "Keep a neutral tone: avoid <i>I think</i>; let facts lead.",
              "Define key terms, use examples, and group related ideas into paragraphs.",

       prompt:"Write an informational piece (about 200 words) explaining <b>how a chosen technology works</b> (e.g. how solar panels generate electricity).",
       model:"<p>Solar panels turn sunlight directly into electricity through a process called the photovoltaic effect.</p><p>Each panel is made of many small cells, usually built from silicon. When sunlight strikes a cell, its energy knocks electrons loose from the silicon atoms. Because the cell is designed with a positive and a negative layer, these freed electrons are pushed to flow in one direction, creating an electric current.</p><p>This current is direct current (DC), but homes use alternating current (AC). A device called an inverter converts the electricity so it can power appliances. Any electricity that is not used immediately can be stored in batteries or sent back to the grid.</p><p>Because their fuel — sunlight — is free and renewable, solar panels have become a key technology in the shift away from fossil fuels.</p>"},

/* ---- Rubrics + heuristic feedback engine (works on static hosting, no API) ---- */
const TRANSITIONS=["however","therefore","for example","for instance","in addition","also","moreover","furthermore","finally","firstly","secondly","first","next","then","because","although","as a result","on the other hand","in conclusion","such as","while"];
const SUBORD=["because","although","while","since","whereas","which","that","who","when","if","though","as"];
const STANCE=["i believe","in my view","in my opinion","i think","should","must","ought to","i feel"];
const EVIDENCE=["for example","for instance","such as","according to","research","study","studies","statistics","evidence","data","percent","%"];
const COUNTER=["however","on the other hand","some argue","critics","opponents","while it is true","admittedly","others believe","it could be argued","nevertheless"];
const SEQUENCE=["first","firstly","second","secondly","next","then","after that","finally","lastly","step"];
const MISSPELL={"alot":"a lot","definately":"definitely","seperate":"separate","recieve":"receive","occured":"occurred","untill":"until","wich":"which","becuase":"because","enviroment":"environment","goverment":"government","beleive":"believe","thier":"their","tommorow":"tomorrow","arguement":"argument","neccessary":"necessary","accomodate":"accommodate","wierd":"weird","embarass":"embarrass","existance":"existence","independant":"independent"};

function metrics(text){
  const raw=(text||"").trim();
  const words=raw?raw.split(/\s+/).filter(Boolean):[];
  const sentences=raw.split(/[.!?]+/).map(s=>s.trim()).filter(Boolean);
  const lens=sentences.map(s=>s.split(/\s+/).filter(Boolean).length);
  const paras=raw.split(/\n\s*\n/).map(p=>p.trim()).filter(Boolean);
  const lower=raw.toLowerCase();
  const cnt=a=>a.filter(w=>lower.includes(w)).length;
  const lw=lower.replace(/[^a-z'\s]/g,' ').split(/\s+/).filter(Boolean);
  const miss=[...new Set(lw.filter(w=>MISSPELL[w]))];
  return { raw, wc:words.length, sc:sentences.length, lens,
    variety: lens.length>1?(Math.max(...lens)-Math.min(...lens)):0,
    paras:paras.length, transitions:cnt(TRANSITIONS), subordinators:cnt(SUBORD),
    stance:cnt(STANCE), evidence:cnt(EVIDENCE)+(/\d/.test(raw)?1:0), counter:cnt(COUNTER),
    sequence:cnt(SEQUENCE), hasGreeting:/^(dear|hi|hello|hey)\b/i.test(raw),
    hasSignoff:/(regards|sincerely|best wishes|yours|take care|see you|thank you|cheers)\b[\s,!.]*\S*\s*$/i.test(raw),
    miss, lowerStarts: sentences.filter(s=>/^[a-z]/.test(s)).length, endsWell:/[.!?]["']?\s*$/.test(raw) };
}
const C = {
  ideas:m=>({band:m.wc>40?4:m.wc>20?3:m.wc>8?2:1, note:m.wc>40?"Plenty of ideas — good fluency.":"Keep your ideas flowing — write more freely without stopping to edit."}),
  length:min=>m=>{const b=m.wc>=min?4:m.wc>=min*.75?3:m.wc>=min*.5?2:1; return {band:b, note:b>=4?`On target (${m.wc} words).`:`Aim for about ${min} words — you have ${m.wc}.`};},
  topic:m=>{const f=m.lens[0]||0; const ok=f>=5&&!/^\s*(what|why|how|when|where|do|does|is|are)\b/i.test(m.raw); const b=ok?4:f>=4?3:f>0?2:1; return {band:b, note:b>=4?"Clear opening that names topic and main idea.":"Open with one sentence stating your topic AND the point you'll make."};},
  support:m=>{const b=m.sc>=4?4:m.sc>=3?3:m.sc>=2?2:1; return {band:b, note:b>=3?"Good supporting detail.":"Add 2–3 sentences of detail, examples or reasons."};},
  transitions:m=>{const b=m.transitions>=3?4:m.transitions>=2?3:m.transitions>=1?2:1; return {band:b, note:b>=3?"Ideas are well linked.":"Use linking words: for example, however, also, finally."};},
  variety:m=>{const b=(m.subordinators>=2&&m.variety>=4)?4:(m.subordinators>=1||m.variety>=3)?3:m.sc>=2?2:1; return {band:b, note:b>=3?"Good sentence variety.":"Mix short and longer sentences; use because/although/which."};},
  structure:m=>{const b=m.paras>=3?4:m.paras>=2?3:m.sc>=4?2:1; return {band:b, note:b>=3?"Clear paragraphing.":"Organise into paragraphs: introduction, body, conclusion (leave a blank line between)."};},
  stance:m=>{const b=m.stance>=2?4:m.stance>=1?3:1; return {band:b, note:b>=3?"Your position is clear.":"State your view clearly (I believe…, … should…)."};},
  evidence:m=>{const b=m.evidence>=2?4:m.evidence>=1?3:1; return {band:b, note:b>=3?"You back up points with examples/evidence.":"Support each point with an example, reason or fact."};},
  counter:m=>{const b=m.counter>=1?4:2; return {band:b, note:b>=4?"You address an opposing view — strong.":"Name the opposing view, then answer it (however…, some argue…)."};},
  sequence:m=>{const b=m.sequence>=3?4:m.sequence>=2?3:m.sequence>=1?2:1; return {band:b, note:b>=3?"Clear step-by-step order.":"Use sequence words: first, next, then, finally."};},
  objective:m=>{const b=m.stance===0?4:m.stance<=1?3:2; return {band:b, note:b>=3?"Suitably neutral, informative tone.":"Keep it factual — avoid 'I think' in informational writing."};},
  greeting:m=>{const b=(m.hasGreeting&&m.hasSignoff)?4:(m.hasGreeting||m.hasSignoff)?3:1; return {band:b, note:b>=4?"Proper greeting and sign-off.":"Open with a greeting (Dear…/Hi…) and close with a sign-off."};},
  accuracy:m=>{const issues=m.miss.length+m.lowerStarts+(m.endsWell?0:1); const b=issues===0?4:issues<=1?3:issues<=3?2:1; let n=b>=4?"Clean and accurate.":""; if(m.miss.length)n+=` Check spelling: ${m.miss.slice(0,4).join(', ')}.`; if(m.lowerStarts)n+=" Begin each sentence with a capital letter."; if(!m.endsWell)n+=" Finish with a full stop."; return {band:b, note:(n||"Proofread once more for small slips.").trim()};}
};
const RUBRICS = {
  freewrite:{label:"Free-writing / planning", criteria:[["Idea generation",C.ideas],["Flow & quantity",C.length(50)],["Focus on the topic",C.topic]]},
  sentence:{label:"Sentence skills", criteria:[["Complete sentences",C.support],["Clarity & quantity",C.length(35)],["Accuracy (capitals & full stops)",C.accuracy]]},
  paragraph:{label:"Paragraph", criteria:[["Topic sentence & controlling idea",C.topic],["Supporting detail",C.support],["Cohesion & transitions",C.transitions],["Sentence variety",C.variety],["Accuracy",C.accuracy]]},
  email:{label:"Email / message", criteria:[["Greeting & sign-off",C.greeting],["Purpose & clarity",C.support],["Register & flow",C.variety],["Accuracy",C.accuracy]]},
  opinion:{label:"Opinion essay", criteria:[["Clear stance",C.stance],["Reasons & support",C.evidence],["Structure",C.structure],["Cohesion",C.transitions],["Accuracy",C.accuracy]]},
  argumentative:{label:"Argumentative essay", criteria:[["Clear claim",C.stance],["Evidence & reasoning",C.evidence],["Counterargument & rebuttal",C.counter],["Structure",C.structure],["Accuracy",C.accuracy]]},
  informational:{label:"Informational essay", criteria:[["Objective tone",C.objective],["Detail & examples",C.evidence],["Structure",C.structure],["Cohesion",C.transitions],["Accuracy",C.accuracy]]},
  instructional:{label:"Instructional writing", criteria:[["Clear sequence",C.sequence],["Complete, clear steps",C.support],["Reader-friendly linking",C.transitions],["Accuracy",C.accuracy]]}
};
function wcFeedback(text, lesson){
  const m=metrics(text);
  const rub=RUBRICS[lesson.rubricKey]||RUBRICS.paragraph;
  const rows=rub.criteria.map(([c,fn])=>{ const r=fn(m,lesson); return {c, band:r.band, note:r.note}; });
  const avg=rows.reduce((a,r)=>a+r.band,0)/rows.length;
  return {m, rub, rows, avg, pct:Math.round(avg/4*100), bandSum:rows.reduce((a,r)=>a+r.band,0), max:rows.length*4};
}
function wcUnits(levelKey){
  const built=WCOURSE[levelKey].units;
  const custom=mergedCustom('writing').filter(w=>w.level===levelKey);
  return custom.length ? built.concat([{id:"uT", title:"Unit · Teacher-added lessons", lessons:custom}]) : built;
}
function findLesson(id){
  for(const lk of Object.keys(WCOURSE)){ const lv=WCOURSE[lk];
    for(const u of wcUnits(lk)){ const ls=u.lessons.find(x=>x.id===id); if(ls) return {levelKey:lk, level:lv, unit:u, lesson:ls}; } }
  return null;
}
function wcLessonCount(){ let n=0; Object.keys(WCOURSE).forEach(k=>wcUnits(k).forEach(u=>n+=u.lessons.length)); return n; }
let WC_LEVEL="beginner";

       text:`<p>Bees are small, but our food depends on them. When a bee visits a flower to drink nectar, yellow dust called pollen sticks to its body. As the bee flies to the next flower, some pollen rubs off. This is called <b>pollination</b>, and it helps plants make seeds and fruit.</p><p>About one in three bites of the food we eat exists because of pollinators like bees. Apples, strawberries, almonds and many vegetables need them. Sadly, bee numbers are falling because of pollution, disease and the loss of wild flowers.</p><p>People can help in simple ways: planting flowers, avoiding harmful sprays, and leaving wild corners in gardens for bees to feed.</p>`,

       text:`<p>When 14-year-old Sofia's small boat drifted onto a deserted island, she had no phone signal and no way to call for help. For two days she watched ships pass far out at sea, too distant to notice her waving.</p><p>Then she remembered a science lesson about levers and stored energy. Using a forked branch, strips of bark, and a length of stretchy vine, she built a simple catapult. With it, she launched a bright piece of cloth wrapped around a stone high into the air, again and again, near the shoreline.</p><p>A passing fisherman finally caught sight of the flash of colour arcing above the trees. Sofia was rescued that evening. 'I didn't have a phone,' she later said, 'but I had a catapult and an idea.'</p>`,

  advanced:{ label:"Advanced", tag:"Proficient", blurb:"Argument, nuance and explanation. Read critically and weigh evidence.", units:[
    {id:"u1", title:"Unit 1 · Informal & opinion texts", lessons:[
      {id:"ra1", title:"Can we really trust AI tutors?", field:"Technology · debate", register:"Informal", type:"Opinion blog",
       text:`<p><i>Opinion · by a Year 12 student</i></p><p>Everyone keeps telling me that AI tutors are the future. Type a question and get a patient, detailed explanation at two o'clock in the morning — what's not to love? Mine genuinely helped me understand calculus when nothing else had, breaking a problem into steps no textbook ever bothered to explain.</p><p>But the more I rely on it, the more uneasy I become. When an answer appears instantly, I stop wrestling with the problem myself — and the wrestling, my teacher insists, is exactly where the learning happens. A muscle that is never strained never grows stronger, and I notice that I remember far less from a solution handed to me than from one I had to fight for.</p><p>There is also the quieter problem of trust. An AI tutor sounds equally confident whether it is right or completely wrong, and a tired student at midnight rarely stops to check. It never says, 'I'm not sure.' That smooth confidence can slowly replace a student's own judgement — one of the very things school is meant to build.</p><p>I am not anti-AI; that would be like refusing to use a calculator. I simply think we should treat it like a gym, not a taxi: something that makes us stronger through effort, not something that carries us while we sit still. Used carelessly, it could produce a generation that can find any answer but truly understand none of them. Used wisely, it might be the most patient teacher any of us has ever had. The tool is remarkable. Whether it helps or harms depends entirely on how we choose to hold it.</p>`,
       mcqs:[

         {q:"What is the writer's overall position?", options:["Ban AI tutors","Use AI wisely — like a gym, not a taxi","Use AI for everything","Ignore teachers"], answer:1, exp:"Not anti-AI — use it to build skill, 'like a gym, not a taxi'."},
         {type:"tfng", q:"The writer believes AI tutors should be banned from schools.", answer:"False", exp:"The writer says 'I am not anti-AI' and argues for using it wisely, not banning it."}
       ],
       selfcheck:[
         {q:"Explain the comparison 'like a gym, not a taxi.' Why is it effective?", model:"A possible answer tours around: a gym makes you stronger through effort; a taxi does the work for you. It is effective because it captures the writer's argument — AI should build skill, not replace effort. Justify from the final paragraph."},

    {id:"u2", title:"Unit 2 · Formal & explanatory texts", lessons:[
      {id:"ra2", title:"How a wind turbine turns wind into power", field:"Physics · energy", register:"Formal", type:"Explanatory feature",
       text:`<p>A wind turbine converts the movement of air into electricity through a chain of surprisingly simple steps. As wind strikes the long, curved blades, the air travelling over the curved side moves faster than the air beneath it, creating a difference in pressure. This produces <b>lift</b> — the very same force that allows aeroplanes to fly — and the blades begin to turn.</p><p>The blades are fixed to a central shaft, which runs back into a sealed box called the nacelle. There, the slow rotation is usually sped up by a gearbox before it reaches the generator. Inside the generator, the spinning motion drags powerful magnets past tightly wound coils of copper wire. This constantly changing magnetic field pushes electrons along the wire, and that flow of electrons is an electric current — the electricity we use.</p><p>Because faster wind carries far more energy, turbines are placed where the wind is strong and steady: on exposed hilltops, across open plains, or out at sea, where nothing slows the air down. Engineers also raise them on tall towers, since wind speeds increase with height.</p><p>A single large turbine can generate enough power for hundreds of homes, and, unlike a coal or gas plant, it burns no fuel and releases no carbon dioxide while running. Wind is not perfect — it does not blow on demand, so turbines must be paired with storage or other sources for calm days. Yet the basic achievement remains remarkable: with no flames and no fuel, a turbine turns an invisible, everyday breeze into usable energy.</p>`,
       mcqs:[
         {q:"What makes the blades turn?", options:["A motor","Lift from a difference in air pressure","Electricity from the generator","Falling water"], answer:1, exp:"Lift, from the air-pressure difference, turns the blades — like an aeroplane wing."},
         {q:"What does the generator contain?", options:["Water and pipes","Magnets and coils of wire","Solar cells","Fuel"], answer:1, exp:"It contains magnets and coils of wire."},

/* ---- Custom (teacher-authored) content: local store + optional cloud delivery ---- */
function getCustom(kind){ return Store.get("ican_custom_"+kind)||[]; }
function setCustom(kind,a){ Store.set("ican_custom_"+kind,a); }
function addCustom(kind,item){ const a=getCustom(kind); a.push(item); setCustom(kind,a); }
function delCustom(kind,id){ setCustom(kind, getCustom(kind).filter(x=>x.id!==id)); }
let CLOUD_CONTENT={reading:[],design:[],writing:[],speaking:[]};
function mergedCustom(kind){
  const local=getCustom(kind), cloud=(CLOUD_CONTENT&&CLOUD_CONTENT[kind])||[];
  const ids=new Set(local.map(x=>x.id));
  return local.concat(cloud.filter(x=>x&&!ids.has(x.id)));
}
function publishContent(cb){
  const url=cloudUrl(); if(!url){ if(cb)cb(false); return; }
  const payload={reading:getCustom('reading'),design:getCustom('design'),writing:getCustom('writing'),speaking:getCustom('speaking')};
  try{ fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({_content:true,payload})}); if(cb)cb(true); }
  catch(e){ if(cb)cb(false); }
}
let _ccbN=0;
function pullContent(cb){
  const url=cloudUrl(); if(!url){ if(cb)cb(); return; }
  const name="__icanCC"+(++_ccbN); let done=false;
  const s=document.createElement("script");
  window[name]=function(data){ done=true; try{s.remove();}catch(e){} delete window[name]; if(data&&typeof data==='object'){ ["reading","design","writing","speaking"].forEach(k=>{ if(Array.isArray(data[k])) CLOUD_CONTENT[k]=data[k]; }); } if(cb)cb(); };
  s.onerror=()=>{ if(!done){ try{s.remove();}catch(e){} if(cb)cb(); } };
  s.src=url+(url.includes("?")?"&":"?")+"action=content&callback="+name+"&t="+Date.now();
  document.body.appendChild(s);
  setTimeout(()=>{ if(!done){ try{s.remove();}catch(e){} if(cb)cb(); } },8000);
}

/* =========================================================================
   LOGIN ACTIONS
   ========================================================================= */
function doStudentLogin(){
  const first=val('sFirst').trim(), middle=val('sMiddle').trim(), last=val('sLast').trim();
  const name=[first,middle,last].filter(Boolean).join(' '), cls="", code=val('sCode').trim().toUpperCase();
  const err=document.getElementById('sErr');
  if(!first||!last){ err.textContent="Please enter your first and last name (middle name optional)."; return; }
  if(!getCodes().map(c=>c.toUpperCase()).includes(code)){ err.textContent="That access code isn't recognised. Check with your teacher."; return; }
  const id = code+"::"+name.toLowerCase();
  SESSION={role:"student", name, first, middle, last, class:cls, code, id};
  setStudent(id,{name, class:cls, code});

const TFNG=["True","False","Not Given"];
function ansIdx(q){ if(q.type==="tfng"){ return typeof q.answer==="number"?q.answer:TFNG.indexOf(q.answer); } return q.answer; }
function renderQuiz(qs){
  const box=document.getElementById('quiz');
  box.innerHTML = qs.map((q,i)=>{
    if(q.type==="mcq"){
      return `<div class="q" data-i="${i}"><div class="qhead">${i+1}. ${q.q}</div>
        ${q.options.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${o}</span></label>`).join('')}
        <div class="feedback hidden"></div></div>`;
    } else if(q.type==="tfng"){
      return `<div class="q" data-i="${i}"><div class="qhead">${i+1}. ${q.q} <span style="font-size:.72rem;color:var(--muted);font-weight:400">— True / False / Not Given</span></div>
        ${TFNG.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${o}</span></label>`).join('')}
        <div class="feedback hidden"></div></div>`;
    } else if(q.type==="reflect"){
      return `<div class="q" data-i="${i}" style="border-color:var(--teal)"><div class="qhead">💡 ${i+1}. ${q.q}</div>
        <textarea name="q${i}" style="min-height:80px" placeholder="Your own ideas — there is no wrong answer…"></textarea>
        <div class="feedback hidden"></div></div>`;
    } else if(q.type==="gap"){
      return `<div class="q" data-i="${i}"><div class="qhead">${i+1}. ${q.q}</div>
        <input type="text" name="q${i}" class="gap-input" autocomplete="off" placeholder="the missing word(s)">
        <div class="feedback hidden"></div></div>`;
    } else {
      return `<div class="q" data-i="${i}"><div class="qhead">${i+1}. ${q.q}</div>
        <textarea name="q${i}" style="min-height:70px" placeholder="Write your answer…"></textarea>
        <div class="feedback hidden"></div></div>`;
    }
  }).join('');
  CURRENT_Q = qs;
}
let CURRENT_Q=[];
function markQuiz(id,skill,title){
  const qs=CURRENT_Q; let auto=0, autoMax=0; const written=[];
  qs.forEach((q,i)=>{
    const qEl=document.querySelector(`.q[data-i="${i}"]`);
    const fb=qEl.querySelector('.feedback');
    fb.classList.remove('hidden');
    if(q.type==="mcq"){
      autoMax++;
      const sel=qEl.querySelector(`input[name="q${i}"]:checked`);
      const chosen = sel? +sel.value : -1;
      qEl.querySelectorAll('.opt').forEach((o,j)=>{
        if(j===q.answer) o.classList.add('correct');
        if(j===chosen && chosen!==q.answer) o.classList.add('wrong');
      });
      if(chosen===q.answer){ auto++; fb.classList.add('good'); fb.textContent="✓ Correct. "+q.exp; }
      else { fb.textContent=(chosen===-1?"No answer chosen. ":"Not quite. ")+q.exp; }
    } else if(q.type==="tfng"){
      autoMax++;
      const ans=ansIdx(q);
      const sel=qEl.querySelector(`input[name="q${i}"]:checked`);
      const chosen = sel? +sel.value : -1;
      qEl.querySelectorAll('.opt').forEach((o,j)=>{ if(j===ans) o.classList.add('correct'); if(j===chosen && chosen!==ans) o.classList.add('wrong'); });
      if(chosen===ans){ auto++; fb.classList.add('good'); fb.textContent=`✓ Correct — ${TFNG[ans]}. ${q.exp}`; }
      else { fb.textContent=(chosen===-1?"No answer chosen. ":"Not quite. ")+`Answer: ${TFNG[ans]}. ${q.exp}`; }
    } else if(q.type==="reflect"){
      const txt=(qEl.querySelector('textarea').value||"").trim();
      if(txt) written.push("Reflection: "+txt);
      fb.classList.add('good');
      fb.innerHTML = txt ? `✓ Thanks for sharing your thinking — your teacher will read this.`
        : `Try writing a sentence or two here. ${q.exp}`;
    } else if(q.type==="gap"){
      autoMax++;
      const inp=qEl.querySelector(`[name="q${i}"]`);
      const got=(inp.value||"").trim();
      const ans=Array.isArray(q.answer)?q.answer:[q.answer];
      const norm=x=>x.toLowerCase().replace(/[.,!?;:'"]/g,'').replace(/\s+/g,' ').trim();
      const ok=ans.some(a=>norm(a)===norm(got));
      if(ok){ auto++; inp.style.borderColor="var(--teal)"; fb.classList.add('good'); fb.textContent="✓ Correct. "+(q.exp||""); }
      else { inp.style.borderColor="var(--coral)"; fb.innerHTML=`Answer: <b>${ans[0]}</b>. ${q.exp||""}`; }
    } else {
      const txt=(qEl.querySelector('textarea').value||"").trim();
      if(txt) written.push("Answer: "+txt);
      fb.innerHTML = `<b>Model answer / answer key:</b> ${q.answer}<br><span style="color:var(--muted)">Hint: ${q.exp}</span>`;
    }
  });
  const pct = autoMax? Math.round(auto/autoMax*100) : null;
  document.getElementById('quizResult').innerHTML =
    `<div class="scorebox"><div class="big">${auto}/${autoMax}</div>
     <div>Auto-marked score${pct!=null?` · ${pct}%`:''}. Written answers are self-marked against the key${written.length?' and shared with your teacher':''}.</div></div>`;
  document.getElementById('submitQ').disabled=true;
  if(SESSION&&SESSION.role==="student"){
    saveResult({date:Date.now(), name:SESSION.name, class:SESSION.class, code:SESSION.code,
      id:SESSION.id, skill, activity:title+(skill==='Reading'?" ("+LEVEL+")":""), score:auto, max:autoMax, percent:pct,
      detail: written.join("  |  ").slice(0,800)});
  }
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

/* =========================================================================
   LISTENING — spelling & dictation (timed, two attempts, reveal on miss)
   ========================================================================= */
let SPELLSTATE=null, _spellTimer=null;
function clearSpellTimer(){ if(_spellTimer){ clearInterval(_spellTimer); _spellTimer=null; } }
function spellTile(key){
  const c=SPELL_BANK[key];
  return `<div class="item-row" style="flex-direction:column;align-items:flex-start">
    <h3 style="font-size:1.15rem;margin:0">${c.label}</h3>
    <div class="meta">${c.sub} · bank of ${c.items.length} ${doneTag('Listening',c.label)}</div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn sm" onclick="go('spellQuiz','${key}')">Start round →</button><button class="btn ghost sm" onclick="wsSpelling('${key}')">📄 Sheet</button></div>
  </div>`;
}
function startSpellTimer(total){
  clearSpellTimer();
  let left=total;
  const bar=document.getElementById('spellBar'), cnt=document.getElementById('spellCount');
  if(cnt)cnt.textContent=left; if(bar)bar.style.width='100%';
  _spellTimer=setInterval(()=>{
    left--;
    if(cnt)cnt.textContent=Math.max(left,0);
    if(bar)bar.style.width=(Math.max(left,0)/total*100)+'%';
    if(left<=0){ clearSpellTimer(); submitSpell(true); }
  },1000);
}
function renderSpell(){
  clearSpellTimer();
  const s=SPELLSTATE;
  if(s.i>=s.items.length){ finishSpell(); return; }
  const item=s.items[s.i];
  const isSentence=s.type==='sentence';
  const t=spellTime(s.type, s.attempt, s.items[s.i].t);
  app().innerHTML=`
  <div class="wrap screen">
    <button class="back" onclick="go('listening')">← Listening</button>
    <h1 style="font-size:1.7rem">🎧 ${s.label}</h1>
    <p style="color:var(--muted)">Item ${s.i+1} of ${s.items.length} · Correct so far: ${s.first+s.second}</p>
    <div class="card" style="max-width:620px">
      <div class="spell-timer"><div class="spell-bar" id="spellBar"></div><span id="spellCount">${t}</span></div>
      <p style="text-align:center;font-weight:600;color:${s.attempt===2?'var(--coral-dk)':'var(--muted)'}">${s.attempt===1?'Attempt 1 of 2':'Attempt 2 — be quick!'}</p>
      <div style="text-align:center;margin:10px 0"><button class="btn dark" onclick="speakItem()">🔊 Play again</button></div>
      ${item.hint?`<p class="note" style="text-align:center">Meaning: ${item.hint}</p>`:''}
      ${isSentence?`<p style="text-align:center;font-size:.82rem;color:var(--muted)">Capital letters and punctuation count.</p>`:''}
      <div class="field"><label>Type exactly what you hear</label>
        <input id="spellIn" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Type here…" onkeydown="if(event.key==='Enter')submitSpell(false)"></div>
      <div class="err" id="spellFb"></div>
      <button class="btn teal" onclick="submitSpell(false)">Submit</button>
    </div>
  </div>`;
  setTimeout(()=>{ const inp=document.getElementById('spellIn'); if(inp)inp.focus(); speakItem(); startSpellTimer(t); },250);
}
function speakItem(){ if(!SPELLSTATE)return; stopSpeak(); speak(SPELLSTATE.items[SPELLSTATE.i].t); }
function checkSpelling(answer, got, type){
  if(type==='sentence'){ const n=x=>x.replace(/\s+/g,' ').trim(); return n(got)===n(answer); }
  const n=x=>x.toLowerCase().replace(/[.,!?;:'"]/g,'').replace(/\s+/g,' ').trim();
  return n(got)===n(answer);
}
function submitSpell(timedOut){
  clearSpellTimer();
  const s=SPELLSTATE; const item=s.items[s.i];
  const got=(val('spellIn')||"").trim();
  const fb=document.getElementById('spellFb');
  if(checkSpelling(item.t, got, s.type)){
    if(s.attempt===1) s.first++; else s.second++;
    s.log.push({t:item.t, got, ok:true, attempt:s.attempt});
    if(fb){ fb.style.color="var(--teal-dk)"; fb.textContent="✓ Correct!"; }
    setTimeout(nextSpell, 800);
    return;
  }
  if(s.attempt===1){
    s.attempt=2;
    if(fb){ fb.style.color="var(--coral-dk)"; fb.textContent=timedOut?"⏱ Time's up — one more try…":"Not quite — one more try…"; }
    setTimeout(renderSpell, 900);
  } else {
    s.missed++;
    s.log.push({t:item.t, got, ok:false, attempt:2});
    revealSpell(item.t);
  }
}
function revealSpell(correct){
  clearSpellTimer();
  app().innerHTML=`<div class="wrap screen"><button class="back" onclick="go('listening')">← Listening</button>
    <div class="card" style="max-width:620px;text-align:center;margin-top:10px">
      <p style="color:var(--coral-dk);font-weight:600;margin:0">The correct spelling was:</p>
      <div class="dictate-display">${esc(correct)}</div>
      <p style="color:var(--muted);margin:0">Next item in <span id="revCount">${SPELL_REVEAL}</span>s…</p>
      <button class="btn ghost sm" style="margin-top:12px" onclick="nextSpell()">Skip ahead</button>
    </div></div>`;
  let left=SPELL_REVEAL;
  _spellTimer=setInterval(()=>{ left--; const c=document.getElementById('revCount'); if(c)c.textContent=Math.max(left,0); if(left<=0){ clearSpellTimer(); nextSpell(); } },1000);
}
function nextSpell(){ clearSpellTimer(); const s=SPELLSTATE; if(!s)return; s.i++; s.attempt=1; renderSpell(); }
function finishSpell(){
  clearSpellTimer();
  const s=SPELLSTATE; const N=s.items.length;
  const pct=Math.round((s.first + 0.5*s.second)/N*100);
  app().innerHTML=`<div class="wrap screen"><button class="back" onclick="go('listening')">← Listening</button>
    <div class="scorebox" style="max-width:520px;margin:24px auto"><div class="big">${pct}%</div>
      <div>${s.first} right first try · ${s.second} on the second · ${s.missed} missed</div>
      <div style="opacity:.85;font-size:.9rem;margin-top:6px">${pct>=80?'Excellent — that bank is getting easy. Try a longer round!':pct>=50?'Good progress. Run it again for fresh items.':'Keep going — every round pulls new words.'}</div></div>
    <div style="text-align:center;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn" onclick="go('spellQuiz','${s.key}')">New round (fresh items)</button>
      <button class="btn ghost" onclick="go('listening')">Back to listening</button>
    </div></div>`;
  if(SESSION&&SESSION.role==="student"){
    saveResult({date:Date.now(),name:SESSION.name,class:SESSION.class,code:SESSION.code,id:SESSION.id,
      skill:"Listening",activity:s.label+" (spelling round)",score:(s.first+s.second),max:N,percent:pct,
      detail:`first-try ${s.first}, second-try ${s.second}, missed ${s.missed}`});
  }
}

let REC=null, REC_TARGET=null;
function startRec(i,k){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  const status=document.getElementById(`recStatus_${i}_${k}`);
  if(!SR){ status.textContent="Speech-to-text isn't supported in this browser — try Chrome. You can still speak aloud and self-assess."; return; }
  stopRec();
  REC=new SR(); REC.continuous=true; REC.interimResults=true; REC.lang='en-US';
  REC_TARGET=document.getElementById(`trans_${i}_${k}`); REC_TARGET.textContent="";
  status.textContent="● Listening…";
  let finalT="";
  REC.onresult=e=>{ let interim=""; for(let n=e.resultIndex;n<e.results.length;n++){ const t=e.results[n][0].transcript; if(e.results[n].isFinal) finalT+=t+" "; else interim+=t; } REC_TARGET.textContent=finalT+interim; };
  REC.onerror=e=>{ status.textContent="Mic error: "+e.error; };
  REC.onend=()=>{ status.textContent="■ Stopped"; };
  try{ REC.start(); }catch(e){ status.textContent="Couldn't start — check microphone permission."; }
}
function stopRec(){ if(REC){ try{REC.stop();}catch(e){} REC=null; } }
function saveSpeaking(i,k,cat){
  const t=document.getElementById(`trans_${i}_${k}`).textContent.trim();

  if(SESSION&&SESSION.role==="student"){

      skill:"Speaking",activity:cat,score:null,max:null,percent:null,
      detail:`${words} spoken words`+(file?`, slides: ${file.name}`:'')});
  }
  document.getElementById(`spkSaved_${i}_${k}`).textContent=`✓ Saved (${words} words${file?', slides attached':''})`;
}

let RC_STATE=null;
function setRcLevel(k){ RC_LEVEL=k; go('readingCourse'); }

function markRcDone(id){ const all=Store.get("ican_rc_done")||{}; const arr=all[sid()]||[]; if(!arr.includes(id)){ arr.push(id); all[sid()]=arr; Store.set("ican_rc_done",all); } }
function gradeRc(id){
  const f=findRc(id); const l=f.lesson;
  let correct=0;
  l.mcqs.forEach((q,i)=>{
    const qEl=document.querySelector(`#rcMcq .q[data-i="${i}"]`); const fb=qEl.querySelector('.feedback');
    fb.classList.remove('hidden');
    const ans=ansIdx(q);
    const sel=qEl.querySelector(`input[name="rmc${i}"]:checked`); const chosen=sel?+sel.value:-1;
    qEl.querySelectorAll('.opt').forEach((o,j)=>{ if(j===ans)o.classList.add('correct'); if(j===chosen&&chosen!==ans)o.classList.add('wrong'); });
    if(chosen===ans){ correct++; fb.classList.add('good'); fb.textContent="✓ Correct. "+q.exp; }
    else fb.textContent=(chosen===-1?"No answer chosen. ":"Not quite. ")+(q.type==="tfng"?`Answer: ${TFNG[ans]}. `:"")+q.exp;
  });
  const mtot=l.mcqs.length, mpct=Math.round(correct/mtot*100);
  // reveal self-check models + grading
  l.selfcheck.forEach((q,i)=>{
    const qEl=document.querySelector(`#rcSelf .q[data-si="${i}"]`);
    const mb=qEl.querySelector('.sc-model'), gb=qEl.querySelector('.sc-grade');
    mb.classList.remove('hidden'); gb.classList.remove('hidden');
    mb.innerHTML=`<div class="feedback good"><b>Model answer &amp; justification:</b> ${q.model}</div>`;
    gb.innerHTML=`<span style="font-size:.85rem;color:var(--muted)">Fairly grade your own answer: </span>
      ${[["0","Not yet"],["1","Partly"],["2","Got it"]].map(([v,t])=>`<button class="chip" data-si="${i}" data-v="${v}" onclick="rcSelfGrade(${i},${v},this)">${t}</button>`).join(' ')}`;
  });
  RC_STATE.graded=true;
  document.getElementById('rcSubmit').disabled=true;
  document.getElementById('rcDesign').classList.remove('hidden');
  renderRcResult(id, correct, mtot, mpct);
  window.scrollTo({top:document.getElementById('rcResult').offsetTop-80, behavior:'smooth'});
}
function rcSelfGrade(i, v, btn){
  RC_STATE.selfMarks[i]=v;
  btn.parentNode.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  const f=findRc(RC_STATE.lessonId);
  renderRcResult(RC_STATE.lessonId, null, f.lesson.mcqs.length, null, true);
}
function renderRcResult(id, correct, mtot, mpct, keepMcq){
  const f=findRc(id); const l=f.lesson;
  if(correct===null){ // recompute mcq from DOM marks
    correct=0; l.mcqs.forEach((q,i)=>{ const sel=document.querySelector(`#rcMcq .q[data-i="${i}"] input:checked`); if(sel&&+sel.value===q.answer)correct++; });
    mpct=Math.round(correct/mtot*100);
  }
  const selfMax=l.selfcheck.length*2;
  const selfGot=Object.values(RC_STATE.selfMarks).reduce((a,b)=>a+b,0);
  const allSelfGraded=Object.keys(RC_STATE.selfMarks).length>=l.selfcheck.length;
  document.getElementById('rcResult').innerHTML=`
    <div class="scorebox"><div class="big">${correct}/${mtot}</div>
      <div>Comprehension (MCQ) · ${mpct}% — scored instantly.</div>
      <div style="margin-top:8px;font-size:.95rem">Self-assessed thinking: <b>${selfGot}/${selfMax}</b> ${allSelfGraded?'':'· grade each self-check above'}</div>
      ${allSelfGraded?`<button class="btn ghost sm" style="margin-top:10px" onclick="saveRc('${id}')">Save my results</button>`:''}
    </div>`;
}
function saveRc(id){
  const f=findRc(id); const l=f.lesson;
  let correct=0; l.mcqs.forEach((q,i)=>{ const sel=document.querySelector(`#rcMcq .q[data-i="${i}"] input:checked`); if(sel&&+sel.value===q.answer)correct++; });
  const mpct=Math.round(correct/l.mcqs.length*100);
  const selfGot=Object.values(RC_STATE.selfMarks).reduce((a,b)=>a+b,0), selfMax=l.selfcheck.length*2;
  markRcDone(id);
  if(SESSION&&SESSION.role==="student"){
    saveResult({date:Date.now(), name:SESSION.name, class:SESSION.class, code:SESSION.code, id:SESSION.id,
      skill:"Reading Course", activity:`${l.title} (${f.level.label})`, score:correct, max:l.mcqs.length, percent:mpct,
      detail:`MCQ ${correct}/${l.mcqs.length}; self-assessed ${selfGot}/${selfMax}`});
  }
  document.getElementById('rcResult').insertAdjacentHTML('beforeend', `<p class="note" style="margin-top:10px">Saved ✓ — your score and self-assessment are recorded. ${f.lesson.designId?'Now try the design challenge below!':''}</p>`);
}

let MR=null, recChunks=[], recBlob=null, recURL=null;
function toggleVocabRec(){
  const btn=document.getElementById('vRecBtn'), st=document.getElementById('vRecStatus');
  if(MR && MR.state==="recording"){ MR.stop(); return; }
  if(!navigator.mediaDevices || !window.MediaRecorder){ st.textContent="Recording isn't supported in this browser — try Chrome. You can still add the word."; return; }
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    recChunks=[]; recBlob=null;
    MR=new MediaRecorder(stream);
    MR.ondataavailable=e=>recChunks.push(e.data);
    MR.onstart=()=>{ btn.innerHTML='<span class="rec-dot"></span>Stop'; st.textContent="Recording… say the word clearly."; };
    MR.onstop=()=>{ recBlob=new Blob(recChunks,{type:'audio/webm'}); if(recURL)URL.revokeObjectURL(recURL); recURL=URL.createObjectURL(recBlob);
      btn.innerHTML='● Record me'; st.textContent="Recorded ✓"; const pb=document.getElementById('vPlayBtn'); if(pb)pb.disabled=false;
      stream.getTracks().forEach(t=>t.stop()); };
    MR.start();
  }).catch(()=>{ st.textContent="Microphone permission denied — you can still add the word and sentence."; });
}

async function playStoredAudio(audioId){ try{ const blob=await IDB.get(audioId); if(blob){ const u=URL.createObjectURL(blob); const a=new Audio(u); a.onended=()=>URL.revokeObjectURL(u); a.play(); } }catch(e){} }

/* Tiny IndexedDB store for voice clips (stays on this device) */
const IDB = {
  _db:null,
  open(){ return new Promise(res=>{ if(this._db) return res(this._db); try{ const r=indexedDB.open("ican_audio",1);
    r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains("clips")) r.result.createObjectStore("clips"); };
    r.onsuccess=()=>{ this._db=r.result; res(this._db); }; r.onerror=()=>res(null);
  }catch(e){ res(null); } }); },
  async put(k,blob){ const db=await this.open(); if(!db)return; return new Promise(res=>{ const tx=db.transaction("clips","readwrite"); tx.objectStore("clips").put(blob,k); tx.oncomplete=()=>res(true); tx.onerror=()=>res(false); }); },
  async get(k){ const db=await this.open(); if(!db)return null; return new Promise(res=>{ const tx=db.transaction("clips","readonly"); const rq=tx.objectStore("clips").get(k); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>res(null); }); }
};

function saveReadingCustom(){
  const title=val('r_title').trim(), text=val('r_text').trim();
  if(!title||!text){ cMsg("Add a title and the reading text.",false); return; }
  const mcqs=[];
  for(let n=0;n<5;n++){ const q=val(`r_m${n}_q`).trim(); const raw=[0,1,2,3].map(j=>val(`r_m${n}_o${j}`).trim());
    const opts=raw.filter(o=>o); const ansRaw=+val(`r_m${n}_ans`)||0;
    if(q && opts.length>=2){ let ans=raw[ansRaw]?opts.indexOf(raw[ansRaw]):0; if(ans<0)ans=0;
      mcqs.push({q, options:opts, answer:ans, exp:val(`r_m${n}_exp`).trim()||"That's the best answer."}); } }
  if(!mcqs.length){ cMsg("Add at least one MCQ (a question + 2 options + a correct option).",false); return; }
  const selfcheck=[];
  for(let n=0;n<2;n++){ const q=val(`r_sc${n}_q`).trim(); if(q) selfcheck.push({q, model:val(`r_sc${n}_model`).trim()||"Compare your answer with the text and judge how fully you answered."}); }
  addCustom('reading',{ id:"rc_custom_"+Date.now(), custom:true, level:val('r_level'), title, field:val('r_field').trim()||"General",
    register:val('r_register'), type:val('r_type').trim()||"Text", text:toParas(text), mcqs, selfcheck,
    design:val('r_design').trim()||"Design something inspired by this text.", designId:val('r_designId')||null });
  renderContentTab('reading'); cMsg("Saved ✓ — it now appears in the Reading Course for students.",true);
}

function importContent(input){
  const f=input.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); let added=0;
    ['reading','writing','design','speaking'].forEach(k=>{ if(Array.isArray(d[k])){ const cur=getCustom(k); const ids=new Set(cur.map(x=>x.id));
      d[k].forEach(it=>{ if(it&&it.id&&!ids.has(it.id)){ cur.push(it); added++; } }); setCustom(k,cur); } });
    const m=document.getElementById('impMsg'); if(m)m.textContent=`Imported ${added} item(s) ✓`;
  }catch(e){ const m=document.getElementById('impMsg'); if(m){ m.style.color='var(--coral-dk)'; m.textContent="That file isn't valid content JSON."; } } };
  r.readAsText(f);
}

/* =========================================================================
   PRINTABLE WORKSHEETS (PDF) — paper-based option for quizzes & activities
   ========================================================================= */
function pdfReady(){ return !!(window.jspdf && window.jspdf.jsPDF); }
function noPdf(){ alert("The worksheet tool is still loading (it needs an internet connection). Please try again in a moment."); }
function htmlToText(html){ return String(html||"")
  .replace(/<\/(p|div|h\d|li|tr)>/gi,"\n").replace(/<br\s*\/?>/gi,"\n").replace(/<li>/gi,"• ")
  .replace(/<th[^>]*>|<td[^>]*>/gi,"   ").replace(/<[^>]+>/g,"")
  .replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&nbsp;/g," ")
  .replace(/\n{3,}/g,"\n\n").trim(); }
const LET=["A","B","C","D","E","F"];
function pdfDoc(titleLeft){
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:"pt",format:"a4"});
  const M=48, W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
  let y=52;
  function header(){ doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(120); doc.text("iCAN · "+(titleLeft||"Worksheet"), M, 26); doc.setTextColor(0); doc.setDrawColor(220); doc.line(M,32,W-M,32); }
  header();
  function ensure(h){ if(y+h>H-M){ doc.addPage(); header(); y=52; } }
  function text(str,opt){ opt=opt||{}; const size=opt.size||11; doc.setFont("helvetica",opt.style||"normal"); doc.setFontSize(size); doc.setTextColor(opt.color!=null?opt.color:25);
    const arr=doc.splitTextToSize(String(str), (W-2*M)); arr.forEach(ln=>{ ensure(size*1.45); doc.text(ln, M, y); y+=size*1.45; }); if(opt.gap)y+=opt.gap; }
  function h1(s){ text(s,{size:17,style:"bold",gap:2}); }
  function h2(s){ y+=6; text(s,{size:13,style:"bold",gap:2}); }
  function lines(n){ for(let i=0;i<n;i++){ ensure(24); doc.setDrawColor(210); doc.line(M,y+12,W-M,y+12); y+=24; } }
  function gap(h){ y+=(h||10); }
  function newpage(){ doc.addPage(); header(); y=52; }
  return {doc,text,h1,h2,lines,gap,newpage,save:n=>doc.save(n)};
}
function nameLine(p){ p.text("Name: __________________     Class: __________     Date: __________",{size:10,gap:8}); }

/* =========================================================================
   DIAGNOSTIC TEST — pre (start of year) & post (end of year)
   Sections: Vocabulary (10) · Grammar (10) · Reading (Part A + Part B) · Writing
   Reading passages & essays use live high-school exam topics.
   ========================================================================= */
const MC=(q,options,answer,exp)=>({type:"mcq",q,options,answer,exp});
const TF=(q,answer,exp)=>({type:"tfng",q,answer,exp});
const DIAG={
  pre:{
    label:"Start-of-year diagnostic", short:"Start-of-year", blurb:"Best taken in the first weeks of the school year.",
    vocab:[
      MC("The new rule will ____ how students use phones at school.",["effect","affect","infect","afflict"],1,"‘Affect’ is the verb meaning to influence; ‘effect’ is usually a noun."),
      MC("Scientists made an important ____ about how birds learn songs.",["discover","discovery","discovered","discoverable"],1,"A noun is needed after ‘an important’."),
      MC("A word meaning the same as ‘huge’ is ____.",["tiny","narrow","enormous","brief"],2,"‘Enormous’ is a synonym for ‘huge’."),
      MC("She spoke with great ____ during the debate.",["confident","confidence","confide","confidently"],1,"A noun follows ‘great’."),
      MC("The opposite of ‘ancient’ is ____.",["historic","antique","old","modern"],3,"‘Modern’ is the opposite of ‘ancient’."),
      MC("We must ____ energy to protect the environment.",["consume","conserve","convert","conceive"],1,"To ‘conserve’ energy means to save it."),
      MC("A person who studies animals is a ____.",["geologist","botanist","zoologist","biographer"],2,"A zoologist studies animals; a botanist studies plants."),
      MC("‘Reliable’ most nearly means ____.",["fragile","trustworthy","temporary","doubtful"],1,"‘Reliable’ means able to be trusted."),
      MC("The story had a surprising ____.",["outline","outcome","outcast","outset"],1,"An ‘outcome’ is a result or ending."),
      MC("Social media can ____ false information very quickly.",["sprain","spare","spread","sprout"],2,"Information ‘spreads’ when it travels widely.")
    ],
    grammar:[
      MC("By the time we arrived, the film ____.",["already started","had already started","has already started","already starts"],1,"Past perfect for the earlier of two past actions."),
      MC("If I ____ more time, I would travel the world.",["have","had","will have","having"],1,"The second conditional uses the past simple after ‘if’."),
      MC("The report, ____ was written by students, won a prize.",["who","which","whom","whose"],1,"‘Which’ refers to a thing (the report)."),
      MC("She is interested ____ learning Japanese.",["on","in","at","of"],1,"‘Interested in’ is the fixed preposition."),
      MC("Neither the teacher nor the students ____ ready.",["was","were","is","has"],1,"With ‘neither…nor’, the verb agrees with the nearer subject (students)."),

      text:`<p>Twenty years ago, most friendships were kept alive face to face or by telephone. Today, a teenager can talk to dozens of people at once without leaving the bedroom. Social media has made the world feel smaller and faster: a photograph taken in one country can be seen everywhere within seconds, and a good idea can reach millions overnight.</p><p>But the same speed has a darker side. Because anyone can post anything, false stories spread just as quickly as true ones. Many young people also feel pressure to appear happy and successful online, comparing their ordinary lives to the polished images of others. Studies suggest that hours of scrolling can leave users feeling more anxious, not less.</p><p>Social media is neither a hero nor a villain. Like any powerful tool, its value depends on how carefully — and how kindly — we choose to use it.</p>`,

    readingB:{ title:"Do animals have language?", topic:"Animal & bird communication", genre:"Science article",
      text:`<p>Humans often assume that language belongs to people alone. Yet the more closely scientists study the natural world, the more they find that animals communicate in surprising and complex ways.</p><p>Honeybees, for example, perform a ‘waggle dance’ inside the hive. By moving in a figure-of-eight and shaking their bodies, a returning bee can tell others the direction and distance of a field of flowers. The angle of the dance points the way; the length of the waggle signals how far to fly.</p><p>Birds, too, do more than simply sing for pleasure. Many species use different alarm calls for different predators. A small bird called the black-capped chickadee adds extra ‘dee’ sounds to its call when a more dangerous enemy is near, almost like turning up the volume of a warning.</p><p>Some animals even appear to give each other names. Dolphins develop a ‘signature whistle’, a unique sound that works much like a personal name, and other dolphins can copy it to get that individual's attention.</p><p>Despite these discoveries, most scientists are careful. Animal communication, they argue, is not the same as human language. Bees cannot discuss the past, and birds cannot invent endless new sentences as humans do; animal signals tend to be fixed and tied to the present moment. Still, the gap may be narrower than we once believed.</p>`,

    readingA:{ title:"Learning beyond the classroom", topic:"Educational camping",
      text:`<p>Some of the most valuable lessons a student learns never appear in a textbook. Educational camping — taking young people out of the classroom and into forests, deserts or mountains — has become popular in many schools for exactly this reason.</p><p>Away from screens and daily routines, students must cook, navigate and solve problems together. A teenager who has never lit a fire or read a map suddenly discovers skills they did not know they had. Just as importantly, they learn to rely on one another. Tasks that seem simple at home become real challenges in the open air, and shy students often surprise everyone, including themselves.</p><p>Critics point out that such trips can be costly and that not every family can afford them. Yet supporters argue that the confidence and teamwork gained are difficult to teach in any other way — and that these lessons last far longer than a single exam.</p>`,

        MC("One criticism of camps mentioned is that they ____.",["are boring","can be expensive","are too short","teach nothing"],1,"Critics note the cost."),

    readingB:{ title:"Working with intelligent machines", topic:"AI for current & future careers", genre:"Opinion article",
      text:`<p>For most of history, new technology replaced muscles. Machines lifted, dug and carried so that humans did not have to. Artificial intelligence is different: it is beginning to take over tasks that once required a trained mind, from reading medical scans to translating languages and writing computer code.</p><p>This shift worries many workers, and not without reason. Jobs built on routine — sorting documents, answering predictable questions, checking data for errors — are the easiest for software to learn. As these tasks are automated, some roles will certainly disappear.</p><p>Yet history offers a more complicated lesson. When cash machines were introduced, many predicted the end of bank workers. Instead, banks opened more branches and staff moved into advice and customer service. Technology destroyed some jobs but created others that no one had imagined.</p><p>The same pattern is likely with AI. The most valuable human skills may become the ones machines struggle to copy: creativity, ethical judgement, persuasion and the ability to work well with others. A doctor may spend less time reading scans and more time talking with patients; a lawyer may rely on software for research but still argue the case.</p><p>For today's students, the message is not to fear these machines but to prepare to work alongside them. Learning to use AI wisely — and developing the human qualities it cannot replace — may matter far more than competing against it.</p>`,

    readingA:{ title:"Why we still tell stories", topic:"Communication · culture",
      text:`<p>Long before writing existed, people sat around fires and told stories. Tens of thousands of years later, with libraries, cinemas and phones at our fingertips, we still cannot stop. Why does storytelling survive every change in technology?</p><p>One answer is that stories are how humans make sense of the world. A list of facts is hard to remember, but the same facts wrapped in a story — with characters, problems and endings — stay with us for years. Stories also let us feel what another person feels, practising kindness and understanding from the safety of our own chair.</p><p>The tools keep changing, from cave walls to glowing screens, but the need does not. Whatever comes next, it seems, we will find a way to tell each other stories.</p>`,

    readingB:{ title:"The clever crows", topic:"Animal communication & intelligence", genre:"Science article",
      text:`<p>For a long time, the word 'birdbrain' was an insult, suggesting someone foolish. Scientists studying crows and their relatives, however, have discovered that these birds are among the most intelligent animals on Earth — and that the insult is badly misplaced.</p><p>Crows can solve puzzles that defeat many mammals. In careful experiments, they have bent wire into hooks to lift food from a tube, and used one tool to reach another in a planned sequence of steps. This suggests they are not simply copying; they appear to understand cause and effect.</p><p>They also communicate in surprisingly rich ways. Crows give different calls for different threats, recognise individual human faces, and even seem to share information about dangerous people with other crows that never saw the event themselves. A crow that has been treated badly by a particular person may later be 'scolded' by birds that were not present at all.</p><p>None of this means crows think exactly as people do. Their world is built around different senses and needs, and we should be careful about reading human motives into animal behaviour. Yet the evidence is humbling. Intelligence, it appears, is not a single ladder with humans at the top, but a branching tree on which many creatures have climbed their own way to remarkable heights.</p>`,

   readingA:{ title:"A small change, a big difference", topic:"Environment — local vs global",
     text:`<p>It is easy to feel powerless about the environment. The problems — melting ice, rising seas, vanishing forests — are global, while a single person seems very small. Yet history shows that large changes often begin with local action.</p><p>When one neighbourhood starts recycling, others notice and copy it. When a school plants trees or bans single-use plastic, students carry those habits home. These small steps rarely solve a global crisis on their own, but together they shift what people see as normal.</p><p>Critics say individual effort is a distraction from the real work of governments and industry. Supporters reply that the two are connected: citizens who change their own habits are far more likely to demand bigger changes from those in power. The local and the global, in other words, push each other forward.</p>`,

   readingB:{ title:"How we learned to see the invisible", topic:"Science now & then", genre:"Science article",
     text:`<p>For most of human history, illness was a mystery. People blamed bad air, bad luck or punishment from the gods, because the true causes were simply too small to see. Without a way to look closer, even the cleverest doctors were guessing.</p><p>The first real breakthrough came in the seventeenth century, when early microscopes revealed a hidden world. A Dutch cloth merchant, Antonie van Leeuwenhoek, ground tiny glass lenses and became the first person to observe living bacteria, which he called ‘animalcules’. Few believed him at first; the idea that invisible creatures filled our water and bodies seemed absurd.</p><p>Two centuries later, scientists such as Louis Pasteur and Robert Koch proved that these microbes could cause disease. This ‘germ theory’ transformed medicine. Doctors began to wash their hands and sterilise instruments, and deaths from infection fell dramatically.</p><p>Today, the tools are almost unimaginably more powerful. Electron microscopes can show individual viruses, and scientists can read the genetic code of a microbe in hours. During recent outbreaks, researchers shared the structure of a new virus within days — a task that would once have taken years, if it had been possible at all.</p><p>Yet the basic lesson has not changed. Progress in medicine has always depended on our ability to see what was previously hidden, and then to act on what we find.</p>`,
