   readingB:{ title:"How children crack the code of language", topic:"Child talk & human language", genre:"Non-fiction article",
     text:`<p>By the age of five, most children can hold a conversation, tell a story and invent sentences they have never heard before. They do this without formal lessons, simply by living among people who talk. How they manage such a feat is one of the great puzzles of science.</p><p>Babies begin by listening. Even before birth, they grow used to the rhythm of their mother's language. In their first year, they babble, testing sounds long before they understand words. Slowly, single words appear — usually names for people and familiar objects — followed by short combinations such as ‘more milk’ or ‘daddy gone’.</p><p>What amazes researchers is that children do not simply copy adults. They produce forms they could never have heard, saying ‘goed’ instead of ‘went’ or ‘foots’ instead of ‘feet’. These ‘mistakes’ are actually a sign of intelligence: the child has worked out a rule and is applying it everywhere, before learning the exceptions.</p><p>Some scientists argue that humans are born with a special capacity for grammar, a kind of mental blueprint. Others believe children learn language as they learn everything else, by noticing patterns. The debate is far from settled.</p><p>What is clear is that language learning is most powerful in early childhood. A skill that an adult struggles for years to master, a small child absorbs almost effortlessly — a reminder of how extraordinary the ordinary human mind really is.</p>`,

     text:`<p>For one week each summer, the small mountain town of Vellac tries an unusual experiment: it asks every resident to switch off their smartphones. Shops display 'no-screen' signs, the school runs outdoor classes, and a single landline in the town square handles emergencies. The idea began as a joke among neighbours; it has since become the town's most famous tradition.</p><p>At first, organisers admit, the week is difficult. People reach instinctively for phones that are not there, and parents worry about being unreachable. But by the third or fourth day, something shifts. Streets that were usually quiet fill with conversation, children invent games, and neighbours who had not spoken in years sit together in the evenings.</p><p>Researchers who study the town are careful not to overstate the results. A week is short, they note, and Vellac is small and unusually close-knit; what works in a mountain village may not work in a busy city. Nor does anyone suggest abandoning technology that brings real benefits, from medicine to education.</p><p>Yet the experiment clearly touches something. Visitors arrive each year to take part, and many leave determined to change their own habits, even slightly. The lesson, residents say, is not that phones are evil, but that attention is precious — and that deciding, deliberately, where to place it can change how a community feels.</p>`,

let CURRENT_EXAM=null, EXAM_TIMER=null;
function diagMCQ(q,n,name){ const opts=q.type==="tfng"?TFNG:q.options; const tag=q.type==="tfng"?` <span style="font-size:.72rem;color:var(--muted);font-weight:400">— True / False / Not Given</span>`:"";
  return `<div class="q"><div class="qhead">${n}. ${q.q}${tag}</div>${opts.map((o,j)=>`<label class="opt"><input type="radio" name="${name}" value="${j}"><span>${o}</span></label>`).join('')}</div>`; }
function diagRadio(name){ const el=document.querySelector(`input[name="${name}"]:checked`); return el?+el.value:-1; }
function diagScore(arr,prefix){ let c=0; const rev=arr.map((q,i)=>{ const ans=ansIdx(q); const got=diagRadio(prefix+i); const ok=got===ans; if(ok)c++; const opts=q.type==="tfng"?TFNG:q.options; return {q:q.q, your:got>=0?opts[got]:"(blank)", correct:opts[ans], exp:q.exp, ok}; }); return {c, max:arr.length, rev}; }
function certBand(p){ return p>=80?"Outstanding":p>=50?"At-level":"Emerging"; }

/* ---- countdown timer ---- */
function clearExamTimer(){ if(EXAM_TIMER){ clearInterval(EXAM_TIMER); EXAM_TIMER=null; } }
function startCountdown(minutes, onZero){
  clearExamTimer(); let remain=Math.round(minutes*60);
  function tick(){ const el=document.getElementById('examClock');
    if(el){ const m=Math.floor(remain/60), s=remain%60; el.textContent=`${m}:${String(s).padStart(2,'0')}`; el.parentElement.style.background = remain<=60?'var(--coral)':(remain<=300?'#d98324':'var(--ink)'); }
    if(remain<=0){ clearExamTimer(); if(onZero)onZero(); return; }
    remain--; }
  tick(); EXAM_TIMER=setInterval(tick,1000);
}

function gradeExam(){
  if(!CURRENT_EXAM)return; const {ex,ctx}=CURRENT_EXAM; CURRENT_EXAM=null; clearExamTimer();
  const V=diagScore(ex.vocab,'d_v_'),G=diagScore(ex.grammar,'d_g_'),RA=diagScore(ex.readingA.questions,'d_ra_'),RB=diagScore(ex.readingB.questions,'d_rb_');
  const rC=RA.c+RB.c, rM=RA.max+RB.max;
  const essay=(val('diagEssay')||"").trim(); const words=essay?essay.split(/\s+/).filter(Boolean).length:0;
  const tot=V.c+G.c+rC, max=V.max+G.max+rM, pct=Math.round(tot/max*100);
  saveResult({skill:ctx.skill, activity:ex.label, score:tot, max, percent:pct,
    detail:`Vocab ${V.c}/${V.max} · Grammar ${G.c}/${G.max} · Reading ${rC}/${rM} · Essay ${words}w: ${essay.slice(0,800)}`});
  showExamResults(ex,ctx,{V,G,RA,RB,rC,rM,tot,max,pct,essay,words});
}

function wsExam(ex, fileTag){ if(!pdfReady())return noPdf(); const p=pdfDoc("Full-length test");
  p.h1(ex.label); nameLine(p);
  const sectionMcq=(title,arr)=>{ p.h2(title); arr.forEach((q,i)=>{ p.text(`${i+1}. ${q.q}`,{style:"bold"}); (q.type==="tfng"?TFNG:q.options).forEach((o,j)=>p.text(`     ${LET[j]}.  ${o}`)); p.gap(2); }); };
  sectionMcq("Section 1 · Vocabulary",ex.vocab); sectionMcq("Section 2 · Grammar",ex.grammar);
  p.h2("Section 3 · Reading");
  p.text(`Part A — ${ex.readingA.title} (${ex.readingA.topic})`,{style:"bold",gap:2}); p.text(htmlToText(ex.readingA.text),{gap:4});
  ex.readingA.questions.forEach((q,i)=>{ p.text(`${i+1}. ${q.q}`,{style:"bold"}); (q.type==="tfng"?TFNG:q.options).forEach((o,j)=>p.text(`     ${LET[j]}.  ${o}`)); p.gap(2); });
  p.gap(4); p.text(`Part B — ${ex.readingB.title} (${ex.readingB.topic})`,{style:"bold",gap:2}); p.text(htmlToText(ex.readingB.text),{gap:4});
  ex.readingB.questions.forEach((q,i)=>{ p.text(`${i+1}. ${q.q}`,{style:"bold"}); (q.type==="tfng"?TFNG:q.options).forEach((o,j)=>p.text(`     ${LET[j]}.  ${o}`)); p.gap(2); });
  p.h2("Section 4 · Writing"); p.text(ex.writing.prompt,{style:"bold",gap:3}); p.text(`Write about ${ex.writing.minWords} words.`,{size:10,color:90,gap:4}); p.lines(14);
  p.newpage(); p.h1("Answer key");
  const key=(t,arr)=>{ p.h2(t); arr.forEach((q,i)=>{ const a=ansIdx(q); const opts=q.type==="tfng"?TFNG:q.options; p.text(`${i+1}.  ${LET[a]} — ${opts[a]}`,{style:"bold"}); if(q.exp)p.text(`     ${q.exp}`,{size:10,color:90}); }); };
  key("Vocabulary",ex.vocab); key("Grammar",ex.grammar); key("Reading — Part A",ex.readingA.questions); key("Reading — Part B",ex.readingB.questions);
  p.h2("Writing"); p.text("Marked by the teacher using the writing rubric.",{size:10,color:90});
  p.save(`iCAN-${fileTag}.pdf`);
}

/* ---- certificate image (canvas → PNG, right-click or button to save) ---- */
function makeCertificate(o){
  const theme = o.band==="Outstanding" ? {a:"#b8860b",b:"#f3d98b",ink:"#5a4500",seal:"#caa12e"}
              : o.band==="At-level"   ? {a:"#0c8a72",b:"#8fd6c6",ink:"#073d33",seal:"#0c8a72"}
              :                          {a:"#2b5fa6",b:"#a9c6ec",ink:"#10294d",seal:"#2b5fa6"};
  const W=1200,H=850,c=document.createElement('canvas'); c.width=W;c.height=H; const x=c.getContext('2d');
  x.fillStyle="#fffdf7"; x.fillRect(0,0,W,H);
  x.strokeStyle=theme.a; x.lineWidth=16; x.strokeRect(30,30,W-60,H-60);
  x.strokeStyle=theme.b; x.lineWidth=4; x.strokeRect(54,54,W-108,H-108);
  x.textAlign="center";
  x.fillStyle=theme.a; x.font="bold 34px Georgia"; x.fillText("iCAN · English Practice", W/2, 140);
  x.fillStyle="#777"; x.font="italic 26px Georgia"; x.fillText("Certificate of Achievement", W/2, 185);
  x.fillStyle=theme.a; x.font="bold 52px Georgia"; x.fillText(o.band.toUpperCase(), W/2, 270);
  x.fillStyle="#555"; x.font="24px Georgia"; x.fillText("This certifies that", W/2, 350);
  let nf=58; x.font="bold "+nf+"px Georgia"; while(x.measureText(o.name).width>W-200 && nf>26){ nf-=2; x.font="bold "+nf+"px Georgia"; }
  x.fillStyle=theme.ink; x.fillText(o.name, W/2, 420);
  x.strokeStyle=theme.b; x.lineWidth=2; x.beginPath(); x.moveTo(W/2-260,440); x.lineTo(W/2+260,440); x.stroke();
  x.fillStyle="#555"; x.font="24px Georgia"; x.fillText("has completed", W/2, 490);
  let tf=30; x.font="bold "+tf+"px Georgia"; while(x.measureText(o.title).width>W-260 && tf>18){ tf-=2; x.font="bold "+tf+"px Georgia"; }
  x.fillStyle=theme.ink; x.fillText(o.title, W/2, 535);
  x.fillStyle=theme.a; x.font="bold 30px Georgia"; x.fillText(`Score: ${o.percent}%   (${o.score}/${o.max})`, W/2, 600);
  x.fillStyle="#777"; x.font="22px Georgia"; x.fillText(o.date, W/2, 650);
  // seal
  x.beginPath(); x.arc(W/2, 730, 46, 0, Math.PI*2); x.fillStyle=theme.seal; x.fill();
  x.fillStyle="#fff"; x.font="bold 20px Georgia"; x.fillText("iCAN", W/2, 737);
  return c.toDataURL("image/png");
}
function certificateHTML(o){
  let url; try{ url=makeCertificate(o); }catch(e){ return `<p class="note">Certificate image couldn't be generated in this browser.</p>`; }
  const fname=`iCAN-certificate-${(o.name||'student').replace(/\s+/g,'-')}.png`;
  return `<div style="text-align:center">
    <img src="${url}" alt="${o.band} certificate for ${esc(o.name)}" style="max-width:100%;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.15)">
    <div style="margin-top:10px"><a class="btn" href="${url}" download="${fname}">⬇ Download certificate</a></div>
    <p style="font-size:.8rem;color:var(--muted);margin-top:6px">You can also right-click (or press &amp; hold) the image and choose “Save image”.</p>
  </div>`;
}

/* =========================================================================
   GRAMMAR LAB — explanation + examples + MCQ & gap-fill practice, by level
   ========================================================================= */
const GAP=(q,answer,exp)=>({type:"gap",q,answer,exp});
const GRAMMAR={
  beginner:{ label:"Beginner", topics:[
    { id:"g_pres", title:"Present simple vs continuous",
      explain:"Use the <b>present simple</b> for habits, routines and facts (<i>I play tennis on Fridays</i>). Use the <b>present continuous</b> (am/is/are + -ing) for actions happening now or around now (<i>I am studying for exams</i>).",
      examples:["Habit: She <b>walks</b> to school every day.","Now: Look — it <b>is raining</b>!","Fact: Water <b>boils</b> at 100°C."],
      questions:[ MC("Every morning she ____ a cup of tea.",["is drinking","drinks","drink","drank"],1,"A daily habit → present simple."),
        MC("Be quiet! The baby ____.",["sleeps","is sleeping","sleep","slept"],1,"Happening now → present continuous."),
        MC("The sun ____ in the east.",["is rising","rises","rise","rose"],1,"A general fact → present simple."),
        GAP("Right now I ____ (read) a great book.",["am reading","i am reading","'m reading"],"Action happening now → am + -ing."),
        GAP("They usually ____ (play) football on Sundays.",["play"],"A routine → present simple.") ] },
    { id:"g_past", title:"Past simple vs present perfect",
      explain:"Use the <b>past simple</b> for finished actions at a specific past time (<i>I visited Rome in 2019</i>). Use the <b>present perfect</b> (have/has + past participle) for past actions connected to now, or with <i>just, already, yet, ever, since, for</i>.",
      examples:["Finished time: I <b>saw</b> her yesterday.","Connected to now: I <b>have</b> just <b>finished</b>.","With 'since': She <b>has lived</b> here since 2010."],
      questions:[ MC("I ____ my keys — I can't find them anywhere.",["lost","have lost","lose","was losing"],1,"The result matters now → present perfect."),
        MC("We ____ to Paris last summer.",["have gone","went","have been","go"],1,"Specific finished time → past simple."),
        MC("She ____ here since 2010.",["lived","has lived","lives","is living"],1,"'since' → present perfect."),
        GAP("I have already ____ (finish) my work.",["finished"],"Present perfect → have + past participle."),
        GAP("They ____ (arrive) an hour ago.",["arrived"],"'an hour ago' = finished time → past simple.") ] },
    { id:"g_art", title:"Articles: a / an / the",
      explain:"Use <b>a/an</b> for a single, non-specific thing (<i>a book, an apple</i> — 'an' before a vowel <i>sound</i>). Use <b>the</b> for something specific or already mentioned. Use <b>no article</b> for general plurals and uncountables.",
      examples:["<b>A</b> dog ran past. <b>The</b> dog was huge.","She is <b>an</b> honest person (vowel sound).","I love music (general — no article)."],
      questions:[ MC("I saw ____ elephant at the zoo.",["a","an","the","—"],1,"'elephant' begins with a vowel sound → 'an'."),
        MC("Can you pass me ____ salt, please?",["a","an","the","—"],2,"Specific salt → 'the'."),
        MC("____ honesty is important.",["A","An","The","—"],3,"General uncountable noun → no article."),
        GAP("She plays ____ piano beautifully.",["the"],"Musical instruments take 'the'."),
        GAP("He is ____ engineer.",["an"],"'engineer' starts with a vowel sound → 'an'.") ] },
    { id:"g_comp", title:"Comparatives & superlatives",
      explain:"Short adjectives add <b>-er/-est</b> (tall → taller → tallest). Longer ones use <b>more/most</b> (more careful). Some are irregular (good → better → best; bad → worse → worst).",
      examples:["This box is <b>heavier</b> than that one.","It was <b>the most interesting</b> film I've seen.","Her work is <b>better</b> than mine."],
      questions:[ MC("Today is ____ than yesterday.",["hot","hotter","hottest","more hot"],1,"Short adjective comparative → 'hotter'."),
        MC("It's ____ day of the year.",["the longer","the longest","longest","more long"],1,"Superlative with 'the'."),
        MC("This question is ____ than the last one.",["difficulter","more difficult","most difficult","difficult"],1,"Long adjective → 'more difficult'."),
        GAP("My brother is ____ (good) at chess than me.",["better"],"Irregular comparative of 'good'."),
        GAP("This is ____ (bad) film I have ever seen.",["the worst"],"Irregular superlative of 'bad' with 'the'.") ] }
  ]},
  intermediate:{ label:"Intermediate", topics:[
    { id:"g_modal", title:"Modal verbs",
      explain:"<b>Obligation:</b> must / have to. <b>Prohibition:</b> mustn't. <b>No obligation:</b> don't have to. <b>Advice:</b> should. <b>Deduction:</b> must (sure true), can't (sure false), might/may (possible).",
      examples:["You <b>must</b> wear a seatbelt (rule).","He <b>can't</b> be home — his car is gone (deduction).","You <b>should</b> rest (advice)."],
      questions:[ MC("You ____ smoke here — it's a hospital.",["mustn't","don't have to","shouldn't have","might not"],0,"Prohibition → 'mustn't'."),
        MC("She's not answering; she ____ be busy.",["can't","must","should","would"],1,"Deduction (probably true) → 'must'."),
        MC("That ____ be true — I saw it myself.",["must","can't","mustn't","needn't"],1,"Sure it's false → 'can't'."),
        GAP("You ____ (advice: 'should' + see) a dentist.",["should see"],"Advice → 'should' + base verb."),
        GAP("We ____ (no obligation) hurry; there's time.",["don't have to","do not have to"],"No obligation → 'don't have to'.") ] },
    { id:"g_cond", title:"Conditionals: first & second",
      explain:"<b>First conditional</b> (real future): If + present simple, will + verb. <b>Second conditional</b> (unreal present): If + past simple, would + verb (use <i>were</i> for all persons).",
      examples:["If we <b>miss</b> the bus, we<b>'ll be</b> late (first).","If I <b>were</b> you, I <b>would</b> apologise (second).","If you <b>heat</b> ice, it <b>melts</b> (general truth)."],
      questions:[ MC("If it rains tomorrow, we ____ the trip.",["cancel","will cancel","would cancel","cancelled"],1,"Real future → first conditional 'will'."),
        MC("If I ____ rich, I would buy a house by the sea.",["am","was","were","will be"],2,"Hypothetical → second conditional 'were'."),
        MC("She would help you if she ____ here.",["is","were","will be","has been"],1,"Second conditional → 'were'."),
        GAP("If you study hard, you ____ (pass) the exam.",["will pass"],"First conditional → will + base verb."),
        GAP("If I ____ (have) more time, I would travel.",["had"],"Second conditional → past simple in the if-clause.") ] },
    { id:"g_ging", title:"Gerund vs infinitive",
      explain:"Some verbs take the <b>-ing form</b> (enjoy, avoid, finish, suggest, mind, can't help). Others take the <b>to-infinitive</b> (want, decide, hope, plan, agree). After a <b>preposition</b> we use -ing.",
      examples:["I enjoy <b>reading</b>.","She decided <b>to leave</b>.","He's good at <b>cooking</b> (after preposition)."],
      questions:[ MC("I can't help ____ at his jokes.",["to laugh","laughing","laugh","laughed"],1,"'can't help' + -ing."),
        MC("They agreed ____ the contract.",["signing","to sign","sign","signed"],1,"'agree' + to-infinitive."),
        MC("She's interested in ____ Arabic.",["learn","to learn","learning","learns"],2,"After a preposition → -ing."),
        GAP("Would you mind ____ (open) the window?",["opening"],"'mind' + -ing."),
        GAP("We hope ____ (see) you soon.",["to see"],"'hope' + to-infinitive.") ] },
    { id:"g_rel", title:"Relative clauses: defining vs non-defining",
      explain:"<b>Defining</b> clauses say which one and use no commas (<i>The man who called is my uncle</i>). <b>Non-defining</b> clauses add extra information, use commas, and never use 'that' (<i>My uncle, who lives in Cairo, called</i>).",
      examples:["The book <b>that</b> I borrowed was great (defining).","Cairo, <b>which</b> is huge, is the capital (non-defining).","The student <b>whose</b> phone rang…"],
      questions:[ MC("The woman ____ lives next door is a doctor.",["which","who","whose","where"],1,"Person, subject → 'who'."),
        MC("Paris, ____ is in France, is beautiful.",["that","which","who","where"],1,"Non-defining about a thing → 'which', not 'that'."),
        MC("That's the boy ____ bag was stolen.",["who","which","whose","whom"],2,"Possession → 'whose'."),
        GAP("This is the house ____ I grew up. (one word, place)",["where"],"Refers to a place → 'where'."),
        GAP("My teacher, ____ is very kind, helped me. (one word)",["who"],"Non-defining, person → 'who'.") ] }
  ]},
  advanced:{ label:"Advanced", topics:[
    { id:"g_mixed", title:"Mixed conditionals",
      explain:"Mix the times. <b>Past condition → present result:</b> If + past perfect, would + verb (<i>If I had saved, I would be rich now</i>). <b>Present condition → past result:</b> If + past simple, would have + participle.",
      examples:["If she <b>had studied</b> medicine, she <b>would be</b> a doctor today.","If he <b>weren't</b> so shy, he <b>would have asked</b> her."],
      questions:[ MC("If I had taken that job, I ____ in London now.",["would live","would have lived","will live","lived"],0,"Past condition → present result: 'would live'."),
        MC("If she ____ more careful, she wouldn't have crashed.",["were","had been","is","would be"],0,"Present trait → past result: 'were'."),
        MC("If we had left earlier, we ____ here by now.",["would be","would have been","will be","were"],0,"Past action → present result: 'would be'."),
        GAP("If I ____ (not eat) so much, I wouldn't feel sick now.",["hadn't eaten","had not eaten"],"Past cause, present result → past perfect."),
        GAP("If he were taller, he ____ (be chosen — passive) for the team last week.",["would have been chosen"],"Present trait, past result → would have been + participle.") ] },
    { id:"g_inv", title:"Inversion (negative adverbials)",
      explain:"For emphasis, a negative/limiting adverbial at the start triggers <b>inversion</b> (auxiliary before subject): Never, Rarely, Seldom, Hardly…when, No sooner…than, Not only…but also, Little.",
      examples:["<b>Never have</b> I seen such a mess.","<b>Hardly had</b> we arrived <b>when</b> it rained.","<b>Not only did</b> he win, but he also broke the record."],
      questions:[ MC("Never ____ such kindness.",["I have seen","have I seen","I saw","did I saw"],1,"Inversion after 'Never' → 'have I seen'."),
        MC("No sooner had we sat down ____ the phone rang.",["when","than","then","that"],1,"'No sooner … than …'."),
        MC("Not only ____ late, but he also forgot the tickets.",["he was","was he","did he was","he did"],1,"Inversion after 'Not only' → 'was he'."),
        GAP("Rarely ____ I been so happy. (one word)",["have"],"Inversion: 'Rarely have I been…'."),
        GAP("Little ____ they know how lucky they were. (one word)",["did"],"'Little did they know…' (inversion).") ] },
    { id:"g_cleft", title:"Cleft sentences (emphasis)",
      explain:"Cleft sentences split one idea into two clauses for emphasis. <b>It-cleft:</b> <i>It was John who paid</i>. <b>What-cleft:</b> <i>What I need is a holiday</i>.",
      examples:["<b>It was</b> in 1969 <b>that</b> humans landed on the Moon.","<b>What</b> she wants <b>is</b> more time.","<b>It's</b> your help <b>that</b> we need."],
      questions:[ MC("____ was Sara who solved the problem.",["It","There","That","What"],0,"It-cleft → 'It was Sara who…'."),
        MC("____ I really enjoy is a long walk.",["That","It","What","Which"],2,"What-cleft → 'What I enjoy is…'."),
        MC("It was at midnight ____ the alarm rang.",["when","that","which","what"],1,"It-cleft uses 'that'."),
        GAP("____ surprised everyone was his honesty. (one word)",["what"],"What-cleft subject → 'What…'."),
        GAP("It ____ his attitude that annoyed me. (one word, past)",["was"],"It-cleft past → 'It was … that'.") ] },
    { id:"g_rather", title:"would rather · had better · would sooner",
      explain:"<b>'d rather / 'd sooner</b> + bare infinitive (<i>I'd rather stay</i>). With a different subject, use the <b>past tense</b> (<i>I'd rather you stayed</i>). <b>'d better</b> + bare infinitive for strong advice or warning.",
      examples:["I'<b>d rather</b> walk than drive.","I'<b>d rather</b> you <b>didn't</b> smoke here.","You'<b>d better</b> hurry."],
      questions:[ MC("I'd rather ____ at home tonight.",["to stay","staying","stay","stayed"],2,"'would rather' + bare infinitive."),
        MC("You'd better ____ now or you'll miss the train.",["leaving","to leave","leave","left"],2,"'had better' + bare infinitive."),
        MC("I'd rather you ____ tell anyone.",["don't","didn't","won't","not"],1,"Different subject → past tense: 'didn't'."),
        GAP("She'd sooner read ____ watch television.",["than"],"'would sooner … than …'."),
        GAP("We'd better ____ (book) the tickets early.",["book"],"'had better' + bare infinitive.") ] },
    { id:"g_nom", title:"Nominalization & emphasis",
      explain:"<b>Nominalization</b> turns verbs/adjectives into nouns for a formal style (decide → the decision; preserve → preservation). The emphatic <b>do/does/did</b> stresses a positive verb (<i>I do understand</i>).",
      examples:["Verb: They <b>decided</b> quickly → Noun: Their <b>decision</b> was quick.","I <b>do</b> appreciate your help.","The <b>preservation</b> of heritage matters."],
      questions:[ MC("Choose the noun form of 'analyse':",["analytical","analyse","analysis","analysing"],2,"Noun form → 'analysis'."),
        MC("Add emphasis: 'I ____ believe you.'",["am","do","have","did"],1,"Emphatic 'do' + base verb."),
        MC("Formal noun for 'to improve':",["improve","improving","improvement","improved"],2,"Noun → 'improvement'."),
        GAP("Verb 'preserve' → noun: the ____ of old homes.",["preservation"],"Nominalization of 'preserve'."),
        GAP("Add emphasis (past): 'She ____ warn us, but we ignored her.'",["did"],"Emphatic 'did' + base verb.") ] }
  ]}
};
function grDone(){ return (Store.get("ican_gr_done")||{})[sid()] || []; }
function markGrDone(id){ const all=Store.get("ican_gr_done")||{}; const a=all[sid()]||[]; if(!a.includes(id)){ a.push(id); all[sid()]=a; Store.set("ican_gr_done",all); } }
function grLessonCount(){ let n=0; Object.values(GRAMMAR).forEach(l=>n+=l.topics.length); return n; }
function findGr(id){ for(const k of Object.keys(GRAMMAR)){ const t=GRAMMAR[k].topics.find(x=>x.id===id); if(t) return {levelKey:k, level:GRAMMAR[k], topic:t}; } return null; }
function gradeGrammar(id,title){ markQuiz(id,'Grammar',title); markGrDone(id); }
function wsGrammar(id){ if(!pdfReady())return noPdf(); const f=findGr(id); const t=f.topic; const p=pdfDoc("Grammar worksheet");
  p.h1(t.title); p.text(f.level.label,{size:9,color:120,gap:6}); nameLine(p);
  p.h2("How it works"); p.text(htmlToText(t.explain),{gap:4});
  p.h2("Examples"); t.examples.forEach(e=>p.text("•  "+htmlToText(e)));
  p.h2("Practice"); t.questions.forEach((q,i)=>{ p.text(`${i+1}. ${q.q}`,{style:"bold"}); if(q.type==="mcq"){ q.options.forEach((o,j)=>p.text(`     ${LET[j]}.  ${o}`)); } else { p.lines(1); } p.gap(2); });
  p.newpage(); p.h1("Answer key"); t.questions.forEach((q,i)=>{ let a; if(q.type==="mcq")a=`${LET[q.answer]} — ${q.options[q.answer]}`; else a=Array.isArray(q.answer)?q.answer[0]:q.answer; p.text(`${i+1}.  ${a}`,{style:"bold"}); if(q.exp)p.text(`     ${q.exp}`,{size:10,color:90}); });
  p.save(`iCAN-grammar-${id}.pdf`);
}
